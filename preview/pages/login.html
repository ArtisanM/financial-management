<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>登录 · 家庭账房</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,ital,wght@9..144,0,300..700;9..144,1,300..600&family=JetBrains+Mono:wght@300;400;500&family=Noto+Serif+SC:wght@300;400;500;600&family=Source+Serif+4:opsz,wght@8..60,300;8..60,400;8..60,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/style.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { paper: 'var(--paper)', 'paper-soft': 'var(--paper-soft)', 'paper-deep': 'var(--paper-deep)', card: 'var(--card)', 'card-soft': 'var(--card-soft)', ink: { DEFAULT: 'var(--ink)', soft: 'var(--ink-soft)', subtle: 'var(--ink-subtle)' }, rule: { DEFAULT: 'var(--rule)', soft: 'var(--rule-soft)' }, brass: { DEFAULT: 'var(--brass)', deep: 'var(--brass-deep)', soft: 'var(--brass-soft)' }, forest: 'var(--forest)', rust: 'var(--rust)' }, fontFamily: { display: ['Fraunces', 'Noto Serif SC', 'serif'], serif: ['"Source Serif 4"', 'Noto Serif SC', 'serif'], mono: ['JetBrains Mono', 'monospace'] } } } }
  </script>
</head>
<body class="min-h-screen flex flex-col">

  <!-- 装饰条 -->
  <div class="fixed top-0 left-0 right-0 h-1 bg-ink z-40"></div>

  <!-- 索引返回 -->
  <a href="../index.html" class="fixed top-6 left-6 font-mono text-[10px] tracking-[0.18em] text-ink-soft hover:text-brass-deep transition z-30">← INDEX</a>

  <main class="flex-1 grid md:grid-cols-2 relative z-10">

    <!-- 左侧 · 引言 -->
    <div class="flex flex-col justify-between p-12 md:p-20 border-r border-rule">
      <div class="font-mono text-[10px] tracking-[0.22em] text-brass-deep">家 · 庭 · 账 · 房 — № 张</div>
      <div class="my-12">
        <h1 class="font-display text-5xl md:text-7xl leading-[0.95] font-medium tracking-tight">
          凡入此册者,<br>
          <span class="italic text-brass-deep font-light">皆有定数。</span>
        </h1>
        <p class="font-serif text-lg text-ink-soft mt-8 max-w-md leading-relaxed">
          每月一日,系统按时备好账册;您与家人各自登录,异步落笔,十分钟内毕事。
        </p>
        <div class="mt-12 grid grid-cols-3 max-w-md font-mono text-[10px] tracking-[0.16em] uppercase text-ink-subtle">
          <div class="border-r border-rule pr-4">
            <div class="text-ink mb-1">15<span class="text-ink-subtle">分</span></div>
            <div>每月填报上限</div>
          </div>
          <div class="px-4 border-r border-rule">
            <div class="text-ink mb-1">12<span class="text-ink-subtle">表</span></div>
            <div>账户与现金流</div>
          </div>
          <div class="pl-4">
            <div class="text-ink mb-1">02<span class="text-ink-subtle">人</span></div>
            <div>异步协作</div>
          </div>
        </div>
      </div>
      <div class="font-mono text-[10px] tracking-[0.18em] text-ink-subtle">
        ANNO 2026 · 北京 · 第 5 月
      </div>
    </div>

    <!-- 右侧 · 表单 -->
    <div class="flex items-center justify-center p-8 md:p-12 bg-card-soft">
      <div class="w-full max-w-md">

        <div class="flex items-baseline justify-between mb-10">
          <h2 class="font-display text-3xl">登录</h2>
          <div class="font-mono text-[10px] tracking-[0.16em] text-ink-subtle">SIGN IN</div>
        </div>

        <form class="space-y-8">
          <div>
            <label class="field-label">登录名 · USERNAME</label>
            <input type="text" class="field-input" value="zhang.wei" placeholder="例:zhang.wei">
          </div>
          <div>
            <label class="field-label">口令 · PASSWORD</label>
            <input type="password" class="field-input" value="••••••••••" placeholder="">
          </div>

          <label class="flex items-center gap-3 select-none cursor-pointer pt-2">
            <input type="checkbox" class="w-4 h-4 accent-[var(--brass)]" checked>
            <span class="font-mono text-[11px] tracking-[0.14em] uppercase text-ink-soft">三十日免输 · keep me</span>
          </label>

          <div class="pt-4">
            <button type="submit" class="btn-ink w-full justify-center">
              入册 · sign in
              <span class="font-display italic">→</span>
            </button>
          </div>
        </form>

        <div class="mt-12 pt-6 border-t border-rule">
          <div class="font-mono text-[10px] tracking-[0.16em] text-ink-subtle mb-3">忘了口令?</div>
          <p class="text-sm text-ink-soft leading-relaxed">
            v0.1 不开放找回。请联系另一位家庭管理员在 <span class="font-mono text-[12px] text-ink">/admin/members</span> 重置临时口令。
          </p>
        </div>

      </div>
    </div>

  </main>

  <footer class="border-t border-rule py-5 px-8 text-center relative z-10">
    <div class="font-mono text-[10px] tracking-[0.18em] text-ink-subtle">
      家庭账房 · v0.1 · 仅限内部使用
    </div>
  </footer>

</body>
</html>
