<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>520 彩蛋 · 一日限定爱情宣言 · 家庭账房 preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,ital,wght@9..144,0,300..700;9..144,1,300..600&family=JetBrains+Mono:wght@300;400;500&family=Noto+Serif+SC:wght@300;400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,300;8..60,400;8..60,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/style.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { colors: { paper: 'var(--paper)', 'paper-soft': 'var(--paper-soft)', 'paper-deep': 'var(--paper-deep)', card: 'var(--card)', 'card-soft': 'var(--card-soft)', ink: { DEFAULT: 'var(--ink)', soft: 'var(--ink-soft)', subtle: 'var(--ink-subtle)' }, rule: { DEFAULT: 'var(--rule)', soft: 'var(--rule-soft)' }, brass: { DEFAULT: 'var(--brass)', deep: 'var(--brass-deep)', soft: 'var(--brass-soft)' }, forest: 'var(--forest)', rust: 'var(--rust)', vred: '#E53A4A', vpink: '#FFD9DC' }, fontFamily: { display: ['Fraunces', 'Noto Serif SC', 'serif'], serif: ['"Source Serif 4"', 'Noto Serif SC', 'serif'], mono: ['JetBrains Mono', 'monospace'] } } } }</script>
  <style>
    /* ===== 520 彩蛋专属样式 (仅本页 / fragment 内 scoped) ===== */
    :root {
      --vred: #E53A4A;
      --vpink: #FFD9DC;
      --vgold: var(--brass-deep);
    }

    /* —— 全屏 overlay ——
       padding-top/-bottom 给心和 press-hint 留 viewport 呼吸空间 · 避免小屏裁切 */
    #easter520 {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(20, 18, 16, 0.88);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 16px 80px;
      overflow-y: auto;
      animation: overlay-in .35s cubic-bezier(.2,.7,.3,1) both;
    }
    #easter520.closing { animation: overlay-out .4s ease-in forwards; }
    @keyframes overlay-in  { from { opacity: 0; } to { opacity: 1; } }
    @keyframes overlay-out { from { opacity: 1; } to { opacity: 0; pointer-events: none; } }

    /* —— 背景星空 —— */
    .stars { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
    .star {
      position: absolute;
      width: 4px; height: 4px;
      background: #fff;
      box-shadow: 0 0 4px #fff;
      animation: twinkle 2.2s ease-in-out infinite;
    }
    .star.dim   { background: #ffd9a8; box-shadow: 0 0 3px #ffd9a8; opacity: .6; }
    .star.gold  { background: var(--vgold); box-shadow: 0 0 6px var(--vgold); }
    @keyframes twinkle { 0%, 100% { opacity: .4; } 50% { opacity: 1; } }

    /* —— 飘心粒子 —— */
    .floater {
      position: absolute;
      bottom: -32px;
      font-size: 14px;
      color: var(--vred);
      filter: drop-shadow(0 0 6px rgba(229,58,74,.7));
      animation: float-up linear forwards;
      pointer-events: none;
      user-select: none;
    }
    .floater.small { font-size: 10px; opacity: .65; color: var(--vpink); }
    .floater.gold  { color: var(--vgold); filter: drop-shadow(0 0 6px rgba(184,134,11,.6)); }
    @keyframes float-up {
      0%   { transform: translateY(0)      translateX(0)   rotate(-12deg); opacity: 0; }
      8%   { opacity: 1; }
      90%  { opacity: 1; }
      100% { transform: translateY(-110vh) translateX(40px) rotate(18deg); opacity: 0; }
    }

    /* —— 中央卡片 ——
       padding-top 缩到 28 让心嵌入卡片内 · 心无负 margin 完整可见 */
    .e520-card {
      position: relative;
      background: var(--paper);
      border: 4px solid var(--vgold);
      box-shadow:
        0 0 0 2px var(--ink),
        0 24px 80px rgba(0,0,0,.5),
        0 0 60px rgba(229,58,74,.25);
      padding: 28px 64px 40px;
      max-width: 640px;
      width: calc(100% - 32px);
      text-align: center;
      animation: card-in .55s cubic-bezier(.2,.8,.2,1) .25s both;
    }
    @keyframes card-in {
      0%   { transform: scale(.4) translateY(40px); opacity: 0; image-rendering: pixelated; clip-path: inset(50% 50%); }
      50%  { clip-path: inset(0% 0%); }
      100% { transform: scale(1)   translateY(0);   opacity: 1; clip-path: inset(0% 0%); }
    }
    /* 像素硬边角装饰 */
    .e520-card::before,
    .e520-card::after {
      content: '';
      position: absolute;
      width: 16px; height: 16px;
      background: var(--vgold);
      box-shadow: 0 0 0 2px var(--ink);
    }
    .e520-card::before { top: -10px; left: -10px; }
    .e520-card::after  { bottom: -10px; right: -10px; }

    /* —— 像素大心 ——
       完整可见 · 无负 margin · 在卡片顶部内嵌入 */
    .pixel-heart-big {
      display: block;
      width: 128px; height: 110px;
      margin: 4px auto 18px;
      filter: drop-shadow(0 4px 0 rgba(0,0,0,.35)) drop-shadow(0 0 20px rgba(229,58,74,.7));
      animation: heartbeat 1s ease-in-out infinite .7s;
    }
    @keyframes heartbeat {
      0%, 30%, 60%, 100% { transform: scale(1); }
      15%                { transform: scale(1.18); }
      45%                { transform: scale(1.08); }
    }

    /* —— 主标题 —— */
    .title-box {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin: 4px 0 24px;
      padding: 8px 18px;
      border: 3px solid var(--ink);
      background: var(--paper-soft);
      box-shadow: 5px 5px 0 var(--vgold), 7px 7px 0 var(--ink);
      animation: title-in .5s cubic-bezier(.2,.9,.2,1) 1.1s both;
    }
    .title-main {
      font-family: 'Fraunces', 'Noto Serif SC', serif;
      font-size: 46px;
      font-weight: 700;
      letter-spacing: .04em;
      color: var(--ink);
      text-shadow: 3px 3px 0 var(--vred), 6px 6px 0 var(--vgold);
      line-height: 1;
    }
    .title-bracket {
      font-family: 'JetBrains Mono', monospace;
      color: var(--vred);
      font-size: 24px;
      font-weight: 700;
    }
    @keyframes title-in {
      0%   { transform: translateY(-12px) scale(.7); opacity: 0; }
      60%  { transform: translateY(2px)   scale(1.08); }
      100% { transform: translateY(0)     scale(1); opacity: 1; }
    }

    /* —— 副标 · 单行 · 文案库随机出一句 —— */
    .subtitle {
      font-family: 'Noto Serif SC', 'Fraunces', serif;
      color: var(--ink);
      font-size: 26px;
      font-weight: 500;
      line-height: 1.5;
      letter-spacing: .08em;
      margin: 12px 0 6px;
      min-height: 1.5em;
      animation: sub-in .55s ease-out 1.6s both;
    }
    .subtitle .accent { color: var(--vred); }
    @keyframes sub-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    /* 切换文案时的局部动画 */
    @keyframes sub-swap {
      0%   { opacity: 0; transform: translateY(6px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* —— "换一句" 小 icon —— */
    .next-slogan-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 14px;
      padding: 6px 14px;
      border: 2px solid var(--ink);
      background: var(--paper-soft);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: .14em;
      color: var(--ink-soft);
      cursor: pointer;
      box-shadow: 3px 3px 0 var(--vgold);
      transition: transform .1s, color .15s, border-color .15s;
      animation: hint-in .4s ease-out 2.2s both;
    }
    .next-slogan-btn:hover { color: var(--vred); border-color: var(--vred); }
    .next-slogan-btn:active { transform: translate(3px, 3px); box-shadow: 0 0 0 var(--vgold); }
    .next-slogan-btn .ic { font-size: 13px; }

    /* —— 底脚 —— */
    .footer-line {
      font-family: 'JetBrains Mono', monospace;
      color: var(--ink-soft);
      font-size: 13px;
      letter-spacing: .18em;
      margin-top: 24px;
      padding-top: 16px;
      border-top: 2px solid var(--rule);
      animation: footer-in .5s ease-out 2.5s both;
    }
    .footer-line b { color: var(--vred); font-weight: 600; }
    @keyframes footer-in { from { opacity: 0; } to { opacity: 1; } }

    /* —— 关闭按钮 —— */
    .e520-close {
      position: absolute;
      top: 8px; right: 8px;
      width: 28px; height: 28px;
      background: var(--ink);
      color: var(--paper);
      border: none;
      font-family: 'JetBrains Mono', monospace;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      line-height: 1;
      transition: background .15s;
      z-index: 2;
    }
    .e520-close:hover { background: var(--vred); }

    /* —— 底部按键提示 —— */
    .press-hint {
      position: absolute;
      bottom: 24px;
      left: 0; right: 0;
      text-align: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: .2em;
      color: rgba(255,255,255,.65);
      text-transform: uppercase;
      animation: hint-in .4s ease-out 2.8s both;
    }
    .press-hint .cursor {
      display: inline-block;
      width: 8px; height: 14px;
      background: rgba(255,255,255,.8);
      vertical-align: -2px;
      margin-left: 4px;
      animation: blink 1s steps(2) infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }
    @keyframes hint-in { from { opacity: 0; } to { opacity: 1; } }

    /* —— 预览页 controls(实际部署没这部分) —— */
    .preview-toolbar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 10001;
      background: var(--paper);
      border-top: 1px solid var(--rule);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }
    .preview-toolbar .label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--ink-subtle);
    }
    .preview-toolbar .label b { color: var(--vred); font-weight: 600; }
    .replay-btn {
      background: var(--ink);
      color: var(--paper);
      border: 2px solid var(--ink);
      padding: 8px 20px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      letter-spacing: .14em;
      cursor: pointer;
      box-shadow: 4px 4px 0 var(--vgold);
      transition: transform .1s;
    }
    .replay-btn:active { transform: translate(4px, 4px); box-shadow: 0 0 0 var(--vgold); }
    .replay-btn:hover { background: var(--vred); border-color: var(--vred); }

    /* 关闭后的灰态 · 模拟回到真实页面后的状态 */
    .post-close-stage {
      position: fixed; inset: 0; z-index: 9998;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      background: var(--paper);
    }
    .post-close-stage.on { display: flex; }
    .post-close-stage .tip {
      font-family: 'Noto Serif SC', serif;
      color: var(--ink-soft);
      font-size: 18px;
    }
    .post-close-stage .sub {
      font-family: 'JetBrains Mono', monospace;
      color: var(--ink-subtle);
      font-size: 11px;
      letter-spacing: .14em;
    }

    /* —— 5.20 nav 右上常驻按钮 · 默认显示 · overlay 打开时藏起 —— */
    .replay-pill {
      position: fixed;
      top: 16px; right: 16px;
      z-index: 10000;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      background: var(--paper);
      border: 2px solid var(--vred);
      color: var(--vred);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      letter-spacing: .12em;
      box-shadow: 3px 3px 0 var(--ink);
      cursor: pointer;
      animation: pill-pulse 2s ease-in-out infinite;
      transition: transform .1s;
      user-select: none;
    }
    .replay-pill.hidden { display: none !important; }
    .replay-pill:active { transform: translate(3px, 3px); box-shadow: 0 0 0 var(--ink); }
    .replay-pill .pill-heart { font-size: 14px; }
    @keyframes pill-pulse {
      0%, 100% { transform: scale(1); }
      50%      { transform: scale(1.06); }
    }
  </style>
</head>
<body class="min-h-screen relative" style="background: #1a1715;">

  <!-- 灰态背景占位 (假装是日常页面 · 让 overlay 看起来真的"覆盖") -->

  <!-- 5.20 当天 右上 ♥520 按钮 · 默认显示 · 每次点都重开+换文案 -->

      <!-- 主标题 -->
      <div class="title-box">
        <span class="title-bracket">+</span>
        <span class="title-main">I LOVE U &nbsp;·&nbsp; 520</span>
        <span class="title-bracket">+</span>
      </div>

      <!-- 副标 · 文案库随机一句 · JS pickSlogan() 渲染 -->
      <div class="subtitle">
        <div class="slogan-line" id="sloganLine">今年520,主角还是你</div>
      </div>

      <!-- "换一句" 小 icon · 显式入口看更多祝福 -->
      <button class="next-slogan-btn" onclick="event.stopPropagation(); changeSlogan();">

      <!-- 底脚 -->

    <!-- 按键提示 -->
    <div class="press-hint">

  <!-- ===== 预览页 toolbar (实际部署不存在) ===== -->
  <div class="preview-toolbar">
    <span class="label">
      preview · v0.4 · <b>520 彩蛋</b> · 一日限定 · 文案库 19 条随机
    </span>
    <div style="display:flex; gap:10px; align-items:center;">
      <a href="../index.html" class="label" style="text-decoration:none">← 返回 preview hub</a>
      <button class="replay-btn" onclick="openEgg()">▶ 重新播放</button>

  <script>
    // ===== 文案库 (用户给的 19 条 · 单行祝福 · 与"账本/记账"无关) =====
    const SLOGANS = [
      "今年 520 · 主角还是你",
      "你一出现 · 我就不想嘴硬了",
      "懂了 · 心动原来长这样",
      "别人 520 · 我和你天天 520",
      "已确认 · 你是长期合作对象",
      "和你待着 · 时间自动变快",
      "今天也在 · 稳定喜欢你",
      "你比朋友圈 · 浪漫多了",
      "爱你这事 · 我没开玩笑",
      "你属于是 · 我的置顶偏爱",
      "和你聊天 · 像在回血",
      "我的人生 Bug · 被你修好了",
      "见到你之后 · 恋爱脑合法了",
      "你是我最近 · 最稳定的快乐",
      "小情侣这身份 · 先续费一辈子",
      "别管 · 反正我最喜欢你",
      "你负责出现 · 我负责心动",
      "喜欢你这件事 · 持续热更新",
      "想和你 · 保持长期稳定关系"
    ];
    let lastSloganIdx = -1;

    function pickSlogan() {
      // 不与上一句重复
      let idx;
      if (SLOGANS.length === 1) idx = 0;
      else {
        do { idx = Math.floor(Math.random() * SLOGANS.length); } while (idx === lastSloganIdx);
      }
      lastSloganIdx = idx;
      return SLOGANS[idx];
    }

    function applySlogan(animate) {
      const node = document.getElementById('sloganLine');
      node.textContent = pickSlogan();
      if (animate) {
        node.style.animation = 'none';
        // eslint-disable-next-line no-unused-expressions
        node.offsetHeight; // reflow
        node.style.animation = 'sub-swap .35s ease-out';
      }
    }

    function changeSlogan() {
      applySlogan(true);
      ding();
    }

    // ===== 像素星空生成 =====
    (function genStars() {
      const stars = document.getElementById('stars');
      const total = 80;
      for (let i = 0; i < total; i++) {
        const s = document.createElement('span');
        const r = Math.random();
        s.className = 'star' + (r < .15 ? ' gold' : (r < .55 ? ' dim' : ''));
        s.style.left = (Math.random() * 100) + '%';
        s.style.top  = (Math.random() * 100) + '%';
        s.style.animationDelay = (Math.random() * 2) + 's';
        if (Math.random() > .7) { s.style.width = '6px'; s.style.height = '6px'; }
        stars.appendChild(s);
      }
    })();

    // ===== 飘心粒子 (持续生成 · 上升消失) =====
    let floaterTimer = null;
    function startFloaters() {
      stopFloaters();
      function spawn() {
        const f = document.createElement('span');
        const variant = Math.random();
        f.className = 'floater' + (variant < .4 ? ' small' : (variant < .55 ? ' gold' : ''));
        f.textContent = ['♥', '♥', '♥', '♡', '♥', '✦'][Math.floor(Math.random() * 6)];
        f.style.left = (Math.random() * 100) + '%';
        f.style.animationDuration = (8 + Math.random() * 7) + 's';
        f.style.fontSize = (12 + Math.random() * 20) + 'px';
        document.getElementById('easter520').appendChild(f);
        setTimeout(() => f.remove(), 16000);
      }
      for (let i = 0; i < 12; i++) setTimeout(spawn, i * 220);
      floaterTimer = setInterval(spawn, 380);
    }
    function stopFloaters() {
      if (floaterTimer) { clearInterval(floaterTimer); floaterTimer = null; }
    }

    // ===== 「叮」音效 · Web Audio 合成 (无外部 mp3 · 不增 jar 体积) =====
    let audioCtx = null;
    function ding() {
      try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const ctx = audioCtx;
        const now = ctx.currentTime;
        [1318.5, 2637].forEach((freq, i) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'sine';
          osc.frequency.value = freq;
          gain.gain.setValueAtTime(0, now);
          gain.gain.linearRampToValueAtTime(i === 0 ? 0.22 : 0.10, now + 0.005);
          gain.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
          osc.connect(gain).connect(ctx.destination);
          osc.start(now);
          osc.stop(now + 0.7);
        });
      } catch (e) { /* 静音 fallback · 不抛错 */ }
    }

    // ===== 打开 / 关闭 / 重开 =====
    function openEgg() {
      const el = document.getElementById('easter520');
      const pill = document.getElementById('navPill');
      const close = document.getElementById('postClose');
      // 重置状态
      el.classList.remove('closing');
      el.style.display = 'flex';
      pill.classList.add('hidden');     // overlay 在前 · pill 暂藏(避免重叠)
      close.classList.remove('on');
      // 每次重开换一句新文案
      applySlogan(false);
      // 清掉残留粒子
      el.querySelectorAll('.floater').forEach(f => f.remove());
      // 重启入场动画 (card / title / subtitle / next-btn / footer / hint)
      ['.e520-card', '.title-box', '.subtitle', '.next-slogan-btn', '.footer-line', '.press-hint'].forEach(sel => {
        const n = el.querySelector(sel) || document.querySelector(sel);
        if (n) { n.style.animation = 'none'; n.offsetHeight; n.style.animation = ''; }
      });
      // 启动粒子 + 入场叮
      startFloaters();
      setTimeout(ding, 700);
    }

    function closeEgg() {
      const el = document.getElementById('easter520');
      if (!el || el.classList.contains('closing')) return;
      ding();
      el.classList.add('closing');
      stopFloaters();
      // 实际部署:localStorage.setItem('easter520_seen', '2026-05-20')
      setTimeout(() => {
        el.style.display = 'none';
        document.getElementById('postClose').classList.add('on');
        document.getElementById('navPill').classList.remove('hidden');  // overlay 走了 · pill 回来
      }, 420);
    }

    // ===== 按键关闭 =====
    document.addEventListener('keydown', (e) => {
      const el = document.getElementById('easter520');
      if (el && el.style.display !== 'none' && !el.classList.contains('closing')) {
        closeEgg();
      }
    });

    // 点击 overlay 任意位置关闭 · 但不要拦截 close × 和 next-slogan-btn(它们 stopPropagation)
    document.getElementById('easter520').addEventListener('click', () => {
      closeEgg();
    });

    // ===== 初始化 ===== 默认 overlay 打开 + pill 隐藏 + 入场动画自动跑
    applySlogan(false);
    setTimeout(() => { ding(); startFloaters(); }, 700);
    // pill 由 openEgg / closeEgg 切换 · 初始 overlay 是开的所以 pill 隐藏
    document.getElementById('navPill').classList.add('hidden');
  </script>
</body>
</html>
