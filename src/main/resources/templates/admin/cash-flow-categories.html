<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('现金流类别 · 管理 · 家庭账房')}"></head>
<body class="min-h-screen relative">
<div class="fixed top-0 left-0 right-0 h-1 bg-ink z-40"></div>
<header th:replace="~{fragments/nav :: nav('admin', ${me}, ${nav})}"></header>
<main class="max-w-[1400px] mx-auto px-6 lg:px-10 py-10 relative z-10 grid grid-cols-12 gap-8">
  <aside th:replace="~{admin/_sidebar :: sidebar('categories')}"></aside>
  <section class="col-span-12 md:col-span-9">
    <div class="mb-8 flex items-end justify-between">
      <div>
        <div class="eyebrow mb-2">现 · 金 · 流 · 类 · 别</div>
        <h1 class="font-display text-4xl font-medium" th:text="|${#lists.size(categories)} 个内置类别|">8 个内置类别</h1>
        <p class="text-ink-soft text-sm mt-2">v0.1 只读;v0.2 可在管理页编辑</p>
      </div>
      <span class="pill pill-rust">v0.1 只读</span>
    </div>
    <div class="paper-card overflow-x-auto">
      <table class="ledger-table">
        <thead><tr><th>顺序</th><th>code</th><th>名称</th><th>方向</th></tr></thead>
        <tbody>
        <tr th:each="c : ${categories}">
          <td class="font-mono text-xs text-ink-subtle" th:text="${c.sortOrder}">1</td>
          <td class="font-mono text-xs" th:text="${c.code}">salary</td>
          <td><span class="font-display" th:text="${c.displayName}">工资</span></td>
          <td>
            <span class="pill" th:if="${c.kind == 'INCOME'}"
                  style="background:var(--forest-soft);color:var(--forest);border-color:var(--forest)">INCOME</span>
            <span class="pill" th:if="${c.kind == 'EXPENSE'}"
                  style="background:var(--rust-soft);color:var(--rust);border-color:var(--rust)">EXPENSE</span>
            <span class="pill" th:if="${c.kind == 'BOTH'}">BOTH</span>
          </td>
        </tr>
        </tbody>
      </table>
    </div>
  </section>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
