<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('周期管理 · 家庭账房')}"></head>
<body class="min-h-screen relative">
<div class="fixed top-0 left-0 right-0 h-1 bg-ink z-40"></div>
<header th:replace="~{fragments/nav :: nav('admin', ${me}, ${nav})}"></header>
<main class="max-w-[1400px] mx-auto px-6 lg:px-10 py-10 relative z-10 grid grid-cols-12 gap-8">
  <aside th:replace="~{admin/_sidebar :: sidebar('periods')}"></aside>
  <section class="col-span-12 md:col-span-9">
    <div class="mb-8">
      <div class="eyebrow mb-2">周 · 期 · 管 · 理</div>
      <h1 class="font-display text-4xl font-medium" th:text="|所有周期 · ${#lists.size(periods)} 期|">所有周期</h1>
      <p class="text-ink-soft text-sm mt-2">关闭周期会自动触发指标重算。已关闭周期可"重新打开",必须填写理由,且会写入审计日志。</p>
    </div>

    <div th:if="${flash}" class="mb-4 border border-forest bg-forest/[0.05] px-4 py-2 text-sm" th:text="${flash}">已保存</div>

    <!-- 当前 OPEN 周期突出 -->
    <div th:if="${currentPeriod != null}" class="envelope p-6 mb-8" style="border-color: var(--brass);">
      <div class="flex items-baseline justify-between mb-3">
        <div>
          <div class="eyebrow mb-1 text-brass-deep">当 · 前 · 周 · 期</div>
          <h2 class="font-display text-3xl font-medium"
              th:text="${#temporals.format(currentPeriod.periodStart,'yyyy · MM')}">2026 · 04</h2>
          <p class="text-sm text-ink-soft mt-1"
             th:text="|${#temporals.format(currentPeriod.periodStart,'yyyy-MM-dd')} — ${#temporals.format(currentPeriod.periodEnd,'yyyy-MM-dd')} · ${currentPeriod.status}|">区间</p>
        </div>
        <span class="pill pill-brass">填报进行中</span>
      </div>
    </div>

    <!-- 历史周期表 -->
    <div class="paper-card overflow-x-auto">
      <table class="ledger-table">
        <thead>
          <tr>
            <th>期号</th>
            <th>区间</th>
            <th>状态</th>
            <th>关闭时间</th>
            <th class="num">操作</th>
          </tr>
        </thead>
        <tbody>
        <tr th:each="p : ${periods}">
          <td class="font-display" th:text="${#temporals.format(p.periodStart,'yyyy-MM')}">2026-04</td>
          <td class="text-xs text-ink-soft"
              th:text="|${#temporals.format(p.periodStart,'MM-dd')} → ${#temporals.format(p.periodEnd,'MM-dd')}|">04-01 → 04-30</td>
          <td>
            <span class="pill pill-brass" th:if="${p.status.name() == 'OPEN'}">OPEN</span>
            <span class="pill" th:if="${p.status.name() == 'CLOSED'}"
                  style="background:var(--forest-soft);color:var(--forest);border-color:var(--forest)">CLOSED</span>
          </td>
          <td class="text-xs"
              th:text="${p.closedAt != null ? #temporals.format(p.closedAt,'yyyy-MM-dd HH:mm') : '—'}">—</td>
          <td class="text-right">
            <form th:if="${p.status.name() == 'CLOSED'}" th:action="@{/admin/periods/{id}/reopen(id=${p.id})}" method="post"
                  onsubmit="return confirm('确认重开?会重算之后所有指标。');">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
              <input type="text" name="reason" placeholder="必填理由" class="text-xs px-2 py-1 border border-rule" required>
              <button class="btn-ghost" style="color:var(--rust)">重新打开</button>
            </form>
            <span th:if="${p.status.name() == 'OPEN'}" class="text-ink-subtle text-xs">—</span>
          </td>
        </tr>
        </tbody>
      </table>
    </div>
  </section>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
