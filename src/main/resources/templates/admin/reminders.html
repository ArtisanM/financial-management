<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('提醒配置 · 家庭账房')}"></head>
<body class="min-h-screen relative">
<div class="fixed top-0 left-0 right-0 h-1 bg-ink z-40"></div>
<header th:replace="~{fragments/nav :: nav('admin', ${me}, ${nav})}"></header>
<main class="max-w-[1400px] mx-auto px-6 lg:px-10 py-10 relative z-10 grid grid-cols-12 gap-8">
  <aside th:replace="~{admin/_sidebar :: sidebar('reminders')}"></aside>
  <section class="col-span-12 md:col-span-9">
    <div class="mb-8 flex items-end justify-between">
      <div>
        <div class="eyebrow mb-2">提 · 醒 · 配 · 置</div>
        <h1 class="font-display text-4xl font-medium">站内 banner 提醒</h1>
        <p class="text-ink-soft text-sm mt-2">v0.1 不发邮件 / 短信 / 微信 — 只有登录后 Dashboard 顶部红色 banner</p>
      </div>
      <span class="pill pill-rust">v0.1 只读</span>
    </div>

    <div class="bracket-card max-w-3xl">
      <div class="eyebrow-ink mb-3">CRON 时间锚点(月度模式)</div>
      <ul class="space-y-3 text-sm">
        <li th:each="a : ${anchors}" class="flex items-baseline gap-3">
          <span class="font-mono text-[10px] tracking-wider text-brass-deep">·</span>
          <span th:text="${a}">每月 1 日 09:00</span>
        </li>
      </ul>
      <p class="font-mono text-[10px] text-ink-subtle mt-5 tracking-wider leading-relaxed">
        v0.2 计划:加入邮件 / 微信公众号推送通道开关。<br/>
        v0.1 实现见 PRD § FR-17。
      </p>
    </div>
  </section>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
