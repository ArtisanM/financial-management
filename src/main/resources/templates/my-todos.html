<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('我的待办 · 家庭账房')}"></head>
<body class="min-h-screen relative">

<div class="fixed top-0 left-0 right-0 h-1 bg-ink z-40"></div>
<header th:replace="~{fragments/nav :: nav('todos', ${me}, ${nav})}"></header>

<main class="max-w-[900px] mx-auto px-6 lg:px-10 py-12 relative z-10">
  <section class="mb-10">
    <div class="eyebrow mb-2">待 · 办 · 备 · 忘</div>
    <h1 class="font-display text-5xl font-medium tracking-tight">
      <span th:text="${me.displayName}">张伟</span> —
      <span class="italic font-light text-brass-deep">这是你要填的</span>
    </h1>
    <p class="text-ink-soft text-sm mt-3">系统按当前 OPEN 周期为你列出应填账户。完成后 ✓ 自动消失。</p>
  </section>

  <section class="mb-10" th:if="${period != null}">
    <div class="flex items-baseline justify-between mb-4">
      <h2 class="font-display text-2xl font-medium">
        <span th:text="${#temporals.format(period.periodStart, 'yyyy · M 月')}">2026 · 5 月</span>
        <span class="font-mono text-base text-brass-deep ml-2" th:text="'· ' + ${period.status}">· OPEN</span>
      </h2>
      <span class="font-mono text-[10px] tracking-[0.16em] text-ink-subtle uppercase"
            th:text="'本期截止 ' + ${#temporals.format(period.periodEnd, 'dd 日')}">本期截止 31 日</span>
    </div>

    <div class="border border-rule">
      <div th:each="row, iter : ${rows}"
           class="px-6 py-4 flex items-center gap-4 border-b border-rule bg-card hover:bg-card-soft">
        <span th:class="${row.done ? 'tick-done' : 'tick-pending'}" th:text="${row.done ? '✓' : '·'}">·</span>
        <div class="flex-1">
          <div class="flex items-baseline gap-3 mb-1 flex-wrap">
            <span class="font-display text-lg" th:classappend="${row.done ? ' line-through text-ink-soft' : ''}" th:text="${row.account.displayName}">富途证券-港美股</span>
            <span class="pill" th:classappend="${row.account.type.name() == 'LOAN' ? ' pill-rust' : (row.account.type.name() == 'WEALTH' ? ' pill-forest' : (row.account.type.name() == 'STOCK' ? ' pill-brass' : ''))}"
                  th:text="${row.account.type}">STOCK</span>
            <span class="pill" th:if="${row.account.currency != 'CNY'}" th:text="${row.account.currency}">USD</span>
          </div>
          <div class="font-mono text-xs text-ink-subtle">
            SNAPSHOT_TODO · 上期末 <span th:text="${row.previousBalanceLabel}">$47,500</span>
          </div>
        </div>
        <span th:if="${row.done}" class="font-mono text-sm tnum" th:text="${row.currentBalanceLabel}">¥73,200</span>
        <a th:if="${!row.done}" th:href="@{/entry(period=${period.id},account=${row.account.id})}" class="btn-paper no-underline">填 →</a>
      </div>
      <div th:if="${#lists.isEmpty(rows)}" class="px-6 py-6 bg-card-soft text-ink-soft">
        当前没有待办。可以直接进入填报页查看全家账户。
      </div>
    </div>
  </section>

  <section class="mb-10" th:if="${period == null}">
    <div class="border border-rule px-6 py-6 bg-card-soft text-ink-soft">
      当前没有 OPEN 周期。系统会在周期开始日自动生成待办。
    </div>
  </section>

  <section class="mb-10 pt-6 border-t-2 border-double border-ink">
    <div class="flex items-baseline justify-between flex-wrap gap-4">
      <div>
        <div class="eyebrow mb-1">主动落笔</div>
        <h3 class="font-display text-xl">想直接进填报页?</h3>
        <p class="text-sm text-ink-soft mt-1">不必等系统提醒,有空就来填。</p>
      </div>
      <a th:href="@{/entry(mine=true)}" class="btn-ink no-underline">前往填报 →</a>
    </div>
  </section>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
