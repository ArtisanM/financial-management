<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<body>
<!--
  KPI 口径说明 tooltip fragment · v0.4.13 · v0.5.3 升级为「口径 + 真实计算数值」
  用法(两参 · 第二参可为 null 表示无可展示数值,仅口径):
  <span class="kpi-eyebrow">净资产
    <th:block th:insert="~{fragments/_kpi-info :: i('总资产 − 总负债 ...', ${calc.netWorth})}"/>
  </span>
  · text = 口径说明(静态公式文字)
  · calc = 服务端按当前币种算好的真实数值串(如「流动资产 ¥X ÷ 月均支出 ¥Y = Z 月」)· null/空则只显口径
-->
<th:block th:fragment="i(text, calc)"><span class="kpi-info-wrap"><button type="button" class="kpi-info-btn" data-kpi-info><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg></button><span class="kpi-info-panel hidden"><span class="kpi-info-formula" th:text="${text}">口径说明</span><span th:if="${calc != null and !#strings.isEmpty(calc)}" class="kpi-info-calc" th:text="${calc}">真实数值</span></span></span></th:block>
</body>
</html>
