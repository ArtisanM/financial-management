<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<body>
<!--
  KPI 口径说明 tooltip fragment · v0.4.13
  用法:在 kpi-eyebrow 后面 th:insert 即可
  <span class="kpi-eyebrow">净资产
    <th:block th:insert="~{fragments/_kpi-info :: i('总资产 − 总负债 ...')}"/>
  </span>
-->
<th:block th:fragment="i(text)"><span class="kpi-info-wrap"><button type="button" class="kpi-info-btn" data-kpi-info><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg></button><span class="kpi-info-panel hidden" th:text="${text}">口径说明</span></span></th:block>
</body>
</html>
