  <!-- v0.11 隐私模式 · FOUC 防闪(决策 129):DOM 构建前据 sessionStorage 设 html.privacy,避免明文闪现 -->
  <script>try{if(sessionStorage.getItem('privacy')==='1')document.documentElement.classList.add('privacy');}catch(e){}</script>
  <!-- v0.2 FR-1/FR-34 · favicon 优先用户自定义 WebP,否则用预设(默认 icon2);apple-touch-icon 永远跟 family.logoPreset(WebP 不适合 iOS)
       BUG-FIX(2026-05-11):删 alternate icon SVG —— Chrome 见 SVG 备选会优先选 SVG(矢量任意 DPI 都清晰),
       把我们的 PNG 预设跳过去。只保留 PNG + 显式 sizes,Chrome 会按 DPI 选最大那张 (192/512)。 -->
  <th:block th:with="preset=${nav != null and nav.family != null and nav.family.logoPreset != null ? nav.family.logoPreset : 'icon2'}">

  <script th:inline="javascript">
    tailwind.config = {
      theme: { extend: {
        colors: {
          paper: 'var(--paper)', 'paper-soft': 'var(--paper-soft)', 'paper-deep': 'var(--paper-deep)',
          card: 'var(--card)', 'card-soft': 'var(--card-soft)',
          ink: { DEFAULT: 'var(--ink)', soft: 'var(--ink-soft)', subtle: 'var(--ink-subtle)' },
          rule: { DEFAULT: 'var(--rule)', soft: 'var(--rule-soft)' },
          brass: { DEFAULT: 'var(--brass)', deep: 'var(--brass-deep)', soft: 'var(--brass-soft)' },
          forest: 'var(--forest)', rust: 'var(--rust)'
        },
        fontFamily: {
          display: ['Fraunces', 'Noto Serif SC', 'serif'],
          serif:   ['"Source Serif 4"', 'Noto Serif SC', 'serif'],
          mono:    ['JetBrains Mono', 'monospace']
        }
      }}
    }

  <script>
    document.addEventListener('htmx:configRequest', function (event) {
      const token = document.querySelector('meta[name="_csrf"]')?.content;
      const header = document.querySelector('meta[name="_csrf_header"]')?.content;
      if (token && header) event.detail.headers[header] = token;
    });
  </script>
  <!-- v0.11 隐私模式 · 样式 + 全局切换(决策 126/127/130/131)。
       绝对金额带 data-priv → html.privacy 下高斯模糊 + 不可选中复制;比例/% 不带标记不受影响。
       两入口(nav + 浮动)都只 toggle html.privacy → 眼睛 eye/eye-off 纯 CSS 跟随,零 JS 同步。 -->
  <style>
    html.privacy [data-priv]{ filter:blur(7px); -webkit-filter:blur(7px); user-select:none; -webkit-user-select:none; cursor:pointer; -webkit-touch-callout:none; }
    /* 按住临时查看(peek):按住时去模糊,松开复原。更具体选择器 → 无需 !important */
    html.privacy [data-priv].priv-peek{ filter:none; -webkit-filter:none; }
    .priv-eye-off{ display:none; } html.privacy .priv-eye-on{ display:none; } html.privacy .priv-eye-off{ display:inline-flex; }
    #priv-float{ position:fixed; left:14px; bottom:18px; z-index:55; display:inline-flex; align-items:center; gap:6px;
      background:var(--card); color:var(--ink-soft); border:1px solid var(--rule); border-radius:999px; padding:8px 11px;
      box-shadow:0 3px 12px rgba(0,0,0,.16); cursor:pointer; font-family:"JetBrains Mono",monospace; font-size:11px; letter-spacing:.04em; }
    #priv-float:hover{ border-color:var(--ink-soft); }
    #priv-float .priv-float-label{ display:none; white-space:nowrap; }
    html.privacy #priv-float{ background:var(--brass-soft); color:var(--brass-deep); border-color:var(--brass); }
    html.privacy #priv-float .priv-float-label{ display:inline; }
  </style>
  <script>
    function togglePrivacy(){
      var on = document.documentElement.classList.toggle('privacy');
      try{ sessionStorage.setItem('privacy', on ? '1' : '0'); }catch(e){}
      // 图表金额标签随隐私态重绘(formatter 内用 window.isPrivacy() 判断);形状不动
      try{ document.querySelectorAll('canvas').forEach(function(c){ var ch=(window.Chart&&Chart.getChart)?Chart.getChart(c):null; if(ch) ch.update('none'); }); }catch(e){}
    }
    window.togglePrivacy = togglePrivacy;
    window.isPrivacy = function(){ return document.documentElement.classList.contains('privacy'); };
    // v0.11 · 按住临时查看(peek):隐私态下「长按」某个被遮金额 → 临时显示,松开/滑走/滚动/失焦 → 复原。
    //   多数金额在 <a> 链接内(KPI 跳 /checkup、账户行跳详情),故:短按=正常跳转(数字仍隐藏);
    //   长按(≥阈值)=peek 显示 + 抑制松手那一次 click(不跳转)。事件委托覆盖 HTMX 片段。
    (function () {
      var HOLD_MS = 320, MOVE_TOL = 10;
      var peeking = null, timer = null, didPeek = false, suppressClick = false, sx = 0, sy = 0;
      function clearTimer() { if (timer) { clearTimeout(timer); timer = null; } }
      function endPeek() { clearTimer(); if (peeking) { peeking.classList.remove('priv-peek'); peeking = null; } }
      document.addEventListener('pointerdown', function (e) {
        suppressClick = false; didPeek = false; clearTimer();
        if (!document.documentElement.classList.contains('privacy')) return;
        var el = e.target.closest ? e.target.closest('[data-priv]') : null;
        if (!el) return;
        sx = e.clientX; sy = e.clientY;
        // 不在 pointerdown preventDefault(否则短按无法跳转 + 阻断滚动);靠 CSS user-select/-webkit-touch-callout 防选中
        timer = setTimeout(function () { el.classList.add('priv-peek'); peeking = el; didPeek = true; }, HOLD_MS);
      }, { passive: true });
      document.addEventListener('pointermove', function (e) {
        // 移动超过容差(滚动/滑走)→ 取消长按计时与 peek,放行滚动与短按语义
        if (Math.abs(e.clientX - sx) > MOVE_TOL || Math.abs(e.clientY - sy) > MOVE_TOL) endPeek();
      }, { passive: true });
      function up() { if (didPeek) suppressClick = true; endPeek(); }
      document.addEventListener('pointerup', up);
      document.addEventListener('pointercancel', endPeek);
      document.addEventListener('scroll', endPeek, true);
      window.addEventListener('blur', endPeek);
      // 长按 peek 后,抑制随之而来的 click(阻止 <a> 跳转);短按不触发,正常跳转
      document.addEventListener('click', function (e) {
        if (suppressClick) { suppressClick = false; e.preventDefault(); e.stopPropagation(); }
      }, true);
    })();
  </script>
  <!-- v0.2 全局错误兜底:HTMX 5xx / 网络错误 / JS 致命异常,统一 toast 反馈 -->
  <script>
    (function () {
      'use strict';

      function toast(msg, level) {
        // 复用现有 showToast 事件协议(detail = { message, level })
        document.body.dispatchEvent(new CustomEvent('showToast', {
          detail: { message: msg, level: level || 'error' },
          bubbles: true
        }));
      }

      // HTMX 服务器返回 4xx / 5xx
      document.addEventListener('htmx:responseError', function (e) {
        var xhr = e.detail.xhr;
        var status = xhr.status;
        var path = (e.detail.requestConfig && e.detail.requestConfig.path) || 'unknown';

        // 401 → 登录态过期,必须跳登录
        if (status === 401) {
          window.location.href = '/login?expired=1';
          return;
        }
        // 403 → CSRF 过期或权限,提示刷新
        if (status === 403) {
          toast('登录态可能已过期,请刷新页面后重试', 'error');
          return;
        }
        // 404 → 资源不存在
        if (status === 404) {
          toast('该数据不存在或已被删除', 'error');
          return;
        }
        // 4xx 其它 → ToastErrorAdvice 已通过 HX-Trigger=showToast 推送了具体消息;这里只兜底
        if (status >= 400 && status < 500) {
          // 业务异常通常已经 toast,如果没有 HX-Trigger,显示通用提示
          if (xhr.getResponseHeader && !xhr.getResponseHeader('HX-Trigger')) {
            toast('请求被拒绝(' + status + '),请检查后重试', 'error');
          }
          return;
        }
        // 5xx → 服务器错误:toast + 控制台留痕。不自动跳 /error(避免丢失填报现场)
        if (status >= 500) {
          toast('服务器繁忙(HTTP ' + status + ',' + path + '),请稍后再试。如反复出现请联系管理员', 'error');
          if (window.console) console.error('HTMX 5xx', status, path, xhr.responseText && xhr.responseText.slice(0, 500));
        }
      });

      // HTMX 网络层错误(请求未发出 / 超时)
      document.addEventListener('htmx:sendError', function () {
        toast('网络异常 — 请检查网络连接后重试', 'error');
      });

      // HTMX 超时
      document.addEventListener('htmx:timeout', function () {
        toast('请求超时 — 服务器响应慢,请稍后再试', 'error');
      });

      // JS 同步异常 — 仅 console,避免噪音(浏览器扩展 / 第三方脚本经常误触发)
      window.addEventListener('error', function (e) {
        // 过滤掉浏览器无关错误
        if (e.message && (
          e.message.indexOf('ResizeObserver') > -1 ||
          e.message.indexOf('Script error') > -1 ||
          e.message.indexOf('Non-Error promise rejection') > -1)) return;
        if (window.console) console.error('Window error:', e.message, 'at', e.filename + ':' + e.lineno);
      });

      // Promise rejection 未捕获
      window.addEventListener('unhandledrejection', function (e) {
        if (window.console) console.error('Unhandled rejection:', e.reason);
      });
    })();
  </script>
  <!-- 全局加载进度条 + 印章式启动遮罩(早注入,首屏即生效) -->
  <style>
    /* 顶部 3px 渐变进度条 + 流动 shimmer 高光 */
    #page-progress {
      position: fixed; top: 0; left: 0; height: 3px; width: 0%;
      background: linear-gradient(90deg, var(--ink) 0%, var(--brass) 45%, var(--brass-deep) 65%, var(--rust) 100%);
      box-shadow: 0 0 12px rgba(167,123,53,0.6), 0 0 6px rgba(159,74,58,0.5), 0 1px 0 rgba(0,0,0,.05);
      z-index: 9999; transition: width .35s cubic-bezier(.22,.9,.22,1), opacity .25s ease;
      opacity: 1; pointer-events: none; overflow: hidden;
    }
    #page-progress::before {
      content: ""; position: absolute; inset: 0; transform: translateX(-100%);
      background: linear-gradient(90deg, transparent, rgba(255,250,240,.85), transparent);
      animation: pp-shimmer 1.4s linear infinite;
    }
    #page-progress.done { opacity: 0; }
    @keyframes pp-shimmer { from { transform: translateX(-100%); } to { transform: translateX(100%); } }

    /* 中央印章式启动遮罩 */
    #page-overlay {
      position: fixed; inset: 0; z-index: 9998; background: var(--paper);
      display: flex; align-items: center; justify-content: center;
      transition: opacity .55s cubic-bezier(.22,.9,.22,1), visibility .55s;
      opacity: 1; visibility: visible;
    }
    #page-overlay.hidden { opacity: 0; visibility: hidden; }
    #page-overlay::before {
      content: ""; position: absolute; inset: 0;
      background: radial-gradient(circle at 50% 45%, transparent 35%, rgba(26,23,20,.04) 70%);
      pointer-events: none;
    }
    #page-overlay .seal-stamp { position: relative; width: 140px; height: 140px; }
    #page-overlay .seal-stamp svg { width: 100%; height: 100%; overflow: visible; }
    #page-overlay .seal-ring-outer {
      fill: none; stroke: var(--ink); stroke-width: 2.5;
      stroke-dasharray: 360; stroke-dashoffset: 360;
      animation: seal-ring 1.6s cubic-bezier(.4,0,.2,1) infinite;
    }
    #page-overlay .seal-ring-inner {
      fill: none; stroke: var(--ink); stroke-width: 0.7; opacity: .7;
      stroke-dasharray: 320; stroke-dashoffset: 320;
      animation: seal-ring 1.6s cubic-bezier(.4,0,.2,1) infinite .15s;
    }
    #page-overlay .seal-fill {
      fill: var(--ink); opacity: 0; transform-origin: center;
      animation: seal-fill 1.6s ease-out infinite .4s;
    }
    #page-overlay .seal-character {
      fill: var(--brass);
      font-family: 'Fraunces', 'Noto Serif SC', serif;
      font-size: 60px; font-weight: 500;
      text-anchor: middle; dominant-baseline: central;
      opacity: 0;
      animation: seal-fade 1.6s ease-out infinite .55s;
    }
    #page-overlay .seal-ink-dot {
      fill: var(--rust); opacity: 0; transform-origin: center;
      animation: seal-pop 1.6s ease-out infinite .9s;
    }
    #page-overlay .seal-label {
      position: absolute; bottom: -42px; left: 50%; transform: translateX(-50%);
      font-family: 'Fraunces', 'Noto Serif SC', serif;
      font-size: 11px; letter-spacing: 0.45em; color: var(--ink-subtle);
      text-transform: uppercase; white-space: nowrap; opacity: 0;
      animation: seal-fade 1.6s ease-out infinite .8s;
    }
    #page-overlay .seal-pulse {
      position: absolute; inset: -20px; border-radius: 50%;
      border: 1px solid var(--brass); opacity: 0;
      animation: seal-wave 1.6s ease-out infinite 1.0s;
    }
    @keyframes seal-ring { 0% { stroke-dashoffset: 360; } 60%, 100% { stroke-dashoffset: 0; } }
    @keyframes seal-fill { 0%, 30% { opacity: 0; transform: scale(0); } 60%, 100% { opacity: 1; transform: scale(1); } }
    @keyframes seal-fade { 0%, 50% { opacity: 0; } 80%, 100% { opacity: 1; } }
    @keyframes seal-pop {
      0%, 50% { opacity: 0; transform: scale(0.3); }
      70% { opacity: 1; transform: scale(1.6); }
      90%, 100% { opacity: 1; transform: scale(1); }
    }
    @keyframes seal-wave { 0% { opacity: .8; transform: scale(.6); } 100% { opacity: 0; transform: scale(1.5); } }
    @keyframes toast-in { from { transform: translateY(-12px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  </style>
  <script>
    (function () {
      var SVG_NS = 'http://www.w3.org/2000/svg';
      function el(tag, attrs, parent) {
        var e = document.createElement(tag);
        if (attrs) for (var k in attrs) e.setAttribute(k, attrs[k]);
        if (parent) parent.appendChild(e);
        return e;
      }
      function svg(tag, attrs, parent) {
        var e = document.createElementNS(SVG_NS, tag);
        if (attrs) for (var k in attrs) e.setAttribute(k, attrs[k]);
        if (parent) parent.appendChild(e);
        return e;
      }

      // 顶部进度条
      var p = el('div', {id: 'page-progress'}, document.documentElement);
      requestAnimationFrame(function () { p.style.width = '30%'; });

      // 中央印章过渡
      var ov = el('div', {id: 'page-overlay'}, document.documentElement);
      var stamp = el('div', {class: 'seal-stamp'}, ov);
      el('div', {class: 'seal-pulse'}, stamp);
      var sv = svg('svg', {viewBox: '0 0 140 140'}, stamp);
      svg('rect', {class: 'seal-ring-outer', x: 14, y: 14, width: 112, height: 112, rx: 6}, sv);
      svg('rect', {class: 'seal-ring-inner', x: 22, y: 22, width:  96, height:  96, rx: 2}, sv);
      svg('rect', {class: 'seal-fill',       x: 30, y: 30, width:  80, height:  80, rx: 2}, sv);
      var ch = svg('text', {class: 'seal-character', x: 70, y: 73}, sv);
      ch.textContent = '账';
      svg('circle', {class: 'seal-ink-dot', cx: 118, cy: 22, r: 6}, sv);
      var lbl = el('div', {class: 'seal-label'}, stamp);
      lbl.textContent = '家 · 庭 · 账 · 房';

      window.addEventListener('DOMContentLoaded', function () { p.style.width = '70%'; });
      window.addEventListener('load', function () {
        p.style.width = '100%';
        setTimeout(function () { p.classList.add('done'); }, 250);
        setTimeout(function () { p.style.width = '0%'; p.classList.remove('done'); }, 700);
        // 给印章动画一个完整周期(~1.6s,首屏看完一次再淡出)
        setTimeout(function () { ov.classList.add('hidden'); }, 1200);
      });
      // 兜底:任意资源 hang 也最多遮 3.5s
      setTimeout(function () { ov.classList.add('hidden'); }, 3500);

      function rearm() { p.classList.remove('done'); p.style.width = '40%'; }
      document.addEventListener('click', function (e) {
        var a = e.target.closest('a');
        if (a && a.href && !a.target && !e.metaKey && !e.ctrlKey
            && !a.hasAttribute('hx-get') && !a.hasAttribute('hx-post')
            && !a.getAttribute('href').startsWith('#')) rearm();
      });
      document.addEventListener('submit', function (e) {
        if (!e.target.hasAttribute('hx-post')) rearm();
      });
      document.addEventListener('htmx:beforeRequest', rearm);
      document.addEventListener('htmx:afterRequest', function () {
        p.style.width = '100%';
        setTimeout(function () { p.classList.add('done'); }, 250);
        setTimeout(function () { p.style.width = '0%'; p.classList.remove('done'); }, 700);
      });
    })();
  </script>

  <!-- 全局 Toast 容器(HX-Trigger=showToast 触发) — 居中顶部,z-index 高于 nav 与 progress -->
  <div id="toast-stack"
       class="fixed top-6 left-1/2 -translate-x-1/2 z-[10000] flex flex-col items-center space-y-2 pointer-events-none w-auto max-w-[90vw]"></div>
  <script>
    (function () {
      function showToast(detail) {
        const msg = (detail && detail.message) || '操作完成';
        const level = (detail && detail.level) || 'info';
        const el = document.createElement('div');
        const palette = {
          error: 'bg-rust text-paper border-rust',
          warn:  'bg-brass text-ink border-brass-deep',
          info:  'bg-ink text-paper border-ink',
          success: 'bg-forest text-paper border-forest'
        };
        el.className = 'pointer-events-auto px-5 py-3 border-2 shadow-2xl max-w-md font-mono text-sm rounded ' + (palette[level] || palette.info);
        el.style.animation = 'toast-in .3s cubic-bezier(.22,.9,.22,1)';
        el.textContent = msg;
        const stack = document.getElementById('toast-stack');
        if (stack) {
          stack.appendChild(el);
          setTimeout(() => { el.style.transition = 'opacity .4s'; el.style.opacity = '0'; }, 4000);
          setTimeout(() => el.remove(), 4500);
        }
      }
      document.body.addEventListener('showToast', function (evt) { showToast(evt.detail); });
      window.showToast = showToast;
    })();
  </script>
  <!-- 条件必填:<input data-require-when="控件名=值"> —— 同表单内名为「控件名」的控件当前值 == 值 时,该字段才 required。
       radio 取 :checked 的 value;checkbox 勾选→其 value(默认 'true')未勾→'false';其它取 .value。
       原生 required 由浏览器/HTMX 拦截提交。HTMX 换入的片段经 htmx:load 再绑(本站条件字段均为整页表单,绑定是冗余保险)。 -->
  <script>
    (function () {
      function curVal(form, name) {
        var r = form.querySelector('input[type="radio"][name="' + name + '"]:checked');
        if (r) return r.value;
        var c = form.querySelector('input[type="checkbox"][name="' + name + '"]');
        if (c) return c.checked ? (c.value || 'true') : 'false';
        var any = form.querySelector('[name="' + name + '"]');
        return any ? any.value : null;
      }
      function wire(scope) {
        (scope || document).querySelectorAll('[data-require-when]').forEach(function (el) {
          if (el.__rqwWired) return; el.__rqwWired = true;
          var spec = el.getAttribute('data-require-when').split('=');
          var name = spec[0], want = spec.slice(1).join('=');
          var form = el.closest('form'); if (!form) return;
          function sync() { el.required = (curVal(form, name) === want); }
          form.querySelectorAll('[name="' + name + '"]').forEach(function (ctrl) {
            ctrl.addEventListener('change', sync);
          });
          sync();
        });
      }
      document.addEventListener('DOMContentLoaded', function () { wire(document); });
      if (document.body) document.body.addEventListener('htmx:load', function (e) { wire(e.target); });
    })();
  </script>
