<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<body>
<header th:fragment="nav(active, me, state)" class="sticky top-1 bg-paper/95 backdrop-blur border-b border-rule z-30">
  <div class="max-w-[1400px] mx-auto px-6 lg:px-10 flex items-center justify-between h-16">
    <div class="flex items-center gap-12">
      <a th:href="@{/}" class="flex items-center gap-2 no-underline"
         th:with="preset=${state.family.logoPreset != null ? state.family.logoPreset : 'icon2'}">
        <img th:src="${state.family.logoPath != null} ? @{|/uploads/${state.family.logoPath}|} : @{/img/presets/{p}-192.png(p=${preset},v=${buildVersion})}"
             onerror="this.onerror=null;this.src='/img/default-logo.svg'"
             alt="logo" class="w-7 h-7 object-contain"/>
        <span class="font-display text-xl font-medium" th:text="${state.family.brandText}">账房</span>
        <span class="font-mono text-[10px] tracking-[0.2em] text-ink-subtle"
              th:text="'№ ' + ${#strings.substring(state.family.name, 0, 1)}">№ 张</span>
      </a>
      <nav class="hidden md:flex items-center gap-7 font-mono text-[11px] tracking-[0.14em] uppercase">
        <a th:href="@{/dashboard}" class="no-underline"
           th:classappend="${active == 'dashboard' ? ' text-ink border-b-2 border-brass pb-[18px]' : ' text-ink-soft hover:text-ink'}">仪表盘</a>
        <a th:href="@{/entry}" class="no-underline"
           th:classappend="${active == 'entry' ? ' text-ink border-b-2 border-brass pb-[18px]' : ' text-ink-soft hover:text-ink'}">填报</a>
        <a th:href="@{/my-todos}" class="no-underline"
           th:classappend="${active == 'todos' ? ' text-ink border-b-2 border-brass pb-[18px]' : ' text-ink-soft hover:text-ink'}">
          待办 <span th:if="${state.pendingCount > 0}" class="ml-1 text-rust" th:text="'·' + ${state.pendingCount}">·2</span>
        </a>
        <a th:href="@{/accounts}" class="no-underline"
           th:classappend="${active == 'accounts' ? ' text-ink border-b-2 border-brass pb-[18px]' : ' text-ink-soft hover:text-ink'}">账户</a>
        <a th:href="@{/reports}" class="no-underline"
           th:classappend="${active == 'reports' ? ' text-ink border-b-2 border-brass pb-[18px]' : ' text-ink-soft hover:text-ink'}">报表</a>
        <a th:href="@{/goals}" class="no-underline"
           th:classappend="${active == 'goals' ? ' text-ink border-b-2 border-brass pb-[18px]' : ' text-ink-soft hover:text-ink'}">目标</a>
        <a th:href="@{/checkup}" class="no-underline"
           th:classappend="${active == 'checkup' ? ' text-ink border-b-2 border-brass pb-[18px]' : ' text-ink-soft hover:text-ink'}">资产体检</a>
        <a th:href="@{/admin}" class="no-underline"
   th:classappend="${active == 'admin' ? ' text-ink border-b-2 border-brass pb-[18px]' : ' text-ink-soft hover:text-ink'}">管理</a>
      </nav>
    </div>
    <div class="flex items-center gap-4">
      <!-- v0.11 隐私模式 · nav 入口(与浮动控件同步 html.privacy · 零 JS 同步)。PC 显示;移动靠左下浮动控件 -->
      <button type="button" onclick="togglePrivacy()" title="隐藏金额(公共场合 / 分享)" aria-label="隐藏 / 显示金额"
              class="pill pill-mute hidden md:inline-flex items-center" style="cursor:pointer;gap:5px">
        <svg class="priv-eye-on" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        <svg class="priv-eye-off" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
      </button>
      <span class="pill pill-brass hidden md:inline-flex" th:text="${state.periodLabel}">2026 · 05 · OPEN</span>
      <span class="font-mono text-[11px] text-ink-soft hidden md:inline" th:text="${me.displayName}">Alice</span>
      <details class="md:hidden relative">
        <summary class="cursor-pointer list-none w-9 h-9 flex items-center justify-center hover:bg-card-soft border border-rule">
          <span class="text-xl leading-none">☰</span>
        </summary>
        <div class="fixed inset-x-0 top-16 bg-card border-y border-rule shadow-xl z-40">
          <nav class="flex flex-col font-mono text-[12px] tracking-[0.14em] uppercase divide-y divide-rule">
            <a th:href="@{/dashboard}" class="px-6 py-4 hover:bg-card-soft no-underline">仪表盘</a>
            <a th:href="@{/entry}" class="px-6 py-4 hover:bg-card-soft no-underline">填报</a>
            <a th:href="@{/my-todos}" class="px-6 py-4 hover:bg-card-soft no-underline">
              待办 <span th:if="${state.pendingCount > 0}" class="ml-2 text-rust" th:text="'·' + ${state.pendingCount}">·2</span>
            </a>
            <a th:href="@{/accounts}" class="px-6 py-4 hover:bg-card-soft no-underline">账户</a>
            <a th:href="@{/reports}" class="px-6 py-4 hover:bg-card-soft no-underline">报表</a>
            <a th:href="@{/goals}" class="px-6 py-4 hover:bg-card-soft no-underline">目标</a>
            <a th:href="@{/checkup}" class="px-6 py-4 hover:bg-card-soft no-underline">资产体检</a>
            <a th:href="@{/admin}" class="px-6 py-4 hover:bg-card-soft no-underline">管理</a>
            <form th:if="${_csrf != null}" th:action="@{/logout}" method="post" class="px-6 py-4 bg-card-soft">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
              <button class="font-mono text-[12px] tracking-[0.14em] uppercase">退出</button>
            </form>
            <div class="px-6 py-3 bg-card-soft text-ink-subtle text-[10px]"
                 th:text="'─ 当前 · ' + ${me.displayName} + ' · ' + ${state.periodLabel}">─ 当前 · Alice · OPEN</div>
          </nav>
        </div>
      </details>
      <div class="w-8 h-8 rounded-full bg-ink text-paper flex items-center justify-center font-display text-sm"
           th:text="${#strings.substring(me.displayName, 0, 1)}">伟</div>
      <form th:if="${_csrf != null}" th:action="@{/logout}" method="post" class="hidden md:inline">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button class="btn-ghost">退出</button>
      </form>
    </div>
  </div>
</header>
</body>
</html>
