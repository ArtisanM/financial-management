<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="modal" class="fixed inset-0 bg-ink/40 z-50 flex items-center justify-center p-6" onclick="if(event.target===this)this.remove()">
  <div class="paper-card bg-card max-w-4xl w-full max-h-[80vh] overflow-auto p-6">
    <div class="flex items-center justify-between mb-4">
      <div>
        <div class="eyebrow mb-1">周期明细</div>
        <h3 class="font-display text-2xl" th:text="${#temporals.format(period.periodStart, 'yyyy-MM')}">2026-04</h3>
      </div>
      <button class="btn-ghost" onclick="this.closest('.fixed').remove()">关闭</button>
    </div>
    <table class="ledger-table">
      <thead><tr><th>账户</th><th>类型</th><th class="num">期末余额</th><th class="num">收入</th><th class="num">支出</th><th class="num">PnL</th></tr></thead>
      <tbody>
      <tr th:each="row : ${rows}">
        <td th:text="${row.accountName}">账户</td>
        <td><span class="pill" th:text="${row.accountType}">CASH</span></td>
        <td class="num" th:text="${row.endBalanceBase == null ? '—' : row.endBalanceBase}">0</td>
        <td class="num" th:text="${row.incomeBase}">0</td>
        <td class="num" th:text="${row.expenseBase}">0</td>
        <td class="num" th:text="${row.periodPnlBase == null ? '—' : row.periodPnlBase}">0</td>
      </tr>
      </tbody>
    </table>
  </div>
</div>
</body>
</html>
