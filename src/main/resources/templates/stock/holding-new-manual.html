<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('添加手填持仓')}"></head>
<body class="min-h-screen relative">
<div class="fixed top-0 left-0 right-0 h-1 bg-ink z-40"></div>
<header th:replace="~{fragments/nav :: nav('accounts', ${me}, ${nav})}"></header>

<main class="max-w-[800px] mx-auto px-6 py-10 relative z-10">
  <div class="font-mono text-[10px] tracking-[0.18em] uppercase text-ink-subtle mb-4">
    <a th:href="@{|/accounts/${account.id}/holdings|}" class="hover:text-ink no-underline">持仓管理</a>
    <span class="mx-2 text-rule">/</span><span class="text-ink">添加 · 手填市值</span>
  </div>

  <div class="mb-8">
    <div class="eyebrow mb-2" style="color:var(--rust)">+ 手 · 填 · 市 · 值 · 持 · 仓</div>
    <h1 class="font-display text-4xl md:text-5xl font-medium tracking-tight">未上市 / 私募 / 拉不到价</h1>
    <p class="font-serif text-sm text-ink-soft mt-3">系统不拉价 · 用户每月在 /entry 时确认是否需要更新。</p>
  </div>

  <form th:action="@{|/accounts/${account.id}/holdings/new-manual|}" method="post" class="paper-card p-8 space-y-5">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

    <div>
      <label class="font-mono text-[10px] uppercase text-ink-subtle mb-1 block">持仓名称</label>
      <input type="text" name="displayName" required
             class="w-full font-display text-xl bg-paper-soft border border-rule px-4 py-3"
             placeholder="字节跳动期权 / 红杉 X 基金">
    </div>

    <div>
      <label class="font-mono text-[10px] uppercase text-ink-subtle mb-1 block"
             th:text="'当前市值(账户币种 ' + ${account.currency} + ')'">当前市值(账户币种 HKD)</label>
      <div class="flex items-center gap-2">
        <span class="font-mono text-xl text-ink-subtle" th:text="${account.currency}">HKD</span>
        <input type="number" name="manualValue" step="0.01" min="0" required
               class="flex-1 font-mono text-xl bg-paper-soft border border-rule px-4 py-3 tnum text-right">
      </div>
      <p class="font-mono text-[10px] text-ink-subtle mt-1"
         th:text="'↳ 直接填账户币种(' + ${account.currency} + ')· 不做汇率换算 · 如果你的实际持仓是其它币种,自己心算后填入'">↳ 直接填账户币种 · 不做汇率换算</p>
    </div>

    <div class="paper-card p-4 bg-card-soft" style="border-left:4px solid var(--rust)">
      <div class="font-mono text-[10px] tracking-[0.18em] uppercase text-rust mb-2">维 · 护 · 提 · 醒</div>
      <ul class="text-xs text-ink-soft space-y-1 list-disc pl-5">
        <li>MANUAL 持仓不参与每日 cron 拉价</li>
        <li>> 30 天未更新 · /entry 持仓变动按钮变橙色</li>
        <li>可随时点[更新]按钮重新填本期值</li>
      </ul>
    </div>

    <div class="flex items-center justify-between pt-6 border-t border-rule-soft">
      <a th:href="@{|/accounts/${account.id}/holdings|}" class="btn-paper no-underline">← 取消</a>
      <button type="submit" class="btn-ink">✓ 添加</button>
    </div>
  </form>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
