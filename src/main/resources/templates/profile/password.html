<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('修改密码 · 家庭账房')}"></head>
<body class="min-h-screen relative">

<div class="fixed top-0 left-0 right-0 h-1 bg-ink z-40"></div>

<main class="max-w-[480px] mx-auto px-6 py-16 relative z-10">
  <div class="eyebrow mb-3">账 · 户 · 安 · 全</div>
  <h1 class="font-display text-4xl font-medium tracking-tight"
      th:text="${forced ? '请先修改临时密码' : '修改我的密码'}">修改我的密码</h1>
  <p class="text-ink-soft text-sm mt-3 leading-relaxed"
     th:text="${forced ?
       '出于安全考虑,临时密码必须在首次登录后立即更换为只有你自己知道的密码。' :
       '建议至少 8 位,可包含字母与数字,避免与其它网站重复。'}">说明</p>

  <div th:if="${error != null}" class="mt-6 border border-rust bg-rust/[0.05] px-4 py-2 text-sm text-rust" th:text="${error}">错误</div>

  <form method="post" th:action="@{/profile/password}" class="mt-8 paper-card p-6 space-y-4">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

    <div>
      <label class="field-label">当前密码</label>
      <div class="relative">
        <input type="password" name="oldPassword" autocomplete="current-password" required
               class="field-input pr-12" placeholder="输入你当前的密码 / 临时密码"/>
        <button type="button" tabindex="-1" aria-label="显示/隐藏"
                onclick="(()=>{const i=this.previousElementSibling;i.type=i.type==='password'?'text':'password';this.textContent=i.type==='password'?'显示':'隐藏';})()"
                class="absolute right-2 top-1/2 -translate-y-1/2 px-2 py-1 font-mono text-[10px] text-ink-soft hover:text-ink select-none">显示</button>
      </div>
    </div>
    <div>
      <label class="field-label">新密码 ·至少 8 位</label>
      <div class="relative">
        <input type="password" name="newPassword" autocomplete="new-password" required minlength="8"
               class="field-input pr-12" placeholder="设定新密码"/>
        <button type="button" tabindex="-1" aria-label="显示/隐藏"
                onclick="(()=>{const i=this.previousElementSibling;i.type=i.type==='password'?'text':'password';this.textContent=i.type==='password'?'显示':'隐藏';})()"
                class="absolute right-2 top-1/2 -translate-y-1/2 px-2 py-1 font-mono text-[10px] text-ink-soft hover:text-ink select-none">显示</button>
      </div>
    </div>
    <div>
      <label class="field-label">再次输入新密码</label>
      <div class="relative">
        <input type="password" name="confirmPassword" autocomplete="new-password" required minlength="8"
               class="field-input pr-12" placeholder="再次确认"/>
        <button type="button" tabindex="-1" aria-label="显示/隐藏"
                onclick="(()=>{const i=this.previousElementSibling;i.type=i.type==='password'?'text':'password';this.textContent=i.type==='password'?'显示':'隐藏';})()"
                class="absolute right-2 top-1/2 -translate-y-1/2 px-2 py-1 font-mono text-[10px] text-ink-soft hover:text-ink select-none">显示</button>
      </div>
    </div>

    <div class="flex justify-between items-center pt-3 border-t border-rule">
      <a th:href="@{/dashboard}" th:if="${!forced}"
         class="font-mono text-[11px] text-ink-soft hover:text-ink no-underline">返回仪表盘</a>
      <span th:if="${forced}" class="font-mono text-[10px] text-ink-subtle">改密之前其它页面将被锁定</span>
      <button class="btn-ink">保存新密码</button>
    </div>
  </form>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
