<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<body>
<!--
  AI 综合智能诊断面板 fragment · v0.2 FR-40c · 决策 20
  由 AiDiagnoseController 渲染,前端通过 HTMX 异步加载替换 spinner placeholder
-->
<section th:fragment="panel" id="ai-diagnose-panel"
         class="paper-card p-6 mb-8 ai-diagnose"
         th:attr="data-vendor=${result.vendor()},data-cache=${result.fromCache()},data-available=${result.available()}">

  <div class="flex items-baseline justify-between mb-3">
    <div class="flex items-baseline gap-3">
      <span class="font-mono text-[10px] tracking-[0.18em] uppercase font-medium"
            th:style="${result.available() ? 'color:var(--brass-deep)' : 'color:var(--ink-soft)'}"
            th:text="${result.available() ? '✨  AI · 综合智能诊断' : 'ℹ️  AI · 暂不可用'}">
        ✨  AI · 综合智能诊断
      </span>
      <span th:if="${result.available()}" class="font-mono text-[9px] uppercase text-ink-subtle">
        <span th:text="${result.vendor()}">qwen</span>
        <span th:if="${result.fromCache()}" class="ml-1 px-1.5 py-px border border-rule-soft text-ink-subtle">cached</span>
      </span>
    </div>
    <button type="button"
            class="text-[10px] font-mono px-2 py-0.5 text-ink-subtle hover:text-brass-deep border border-rule-soft hover:border-brass-deep transition"
            th:hx-get="${scope == 'ACCOUNT' ? '/checkup/diagnose?account=' + accountId + '&refresh=true' : '/checkup/diagnose?refresh=true'}"
            hx-target="#ai-diagnose-panel"
            hx-swap="outerHTML"
            title="重新生成 AI 诊断(忽略缓存)">↻ 刷新</button>
  </div>

  <!-- v0.4.9 · 结构化 JSON 输出 → 4 维度卡 + 总评 + 优先行动 -->
  <th:block th:if="${result.available() and result.structured() != null}"
            th:with="s=${result.structured()}">

    <!-- 总评 banner -->
    <div class="paper-card p-3 mb-4"
         th:with="vc=${s.overallVerdict()}"
         th:style="${vc == 'RISK' ? 'background:rgba(159,74,58,.06); border-left:4px solid var(--rust)' :
                     (vc == 'NEEDS_ATTENTION' ? 'background:rgba(196,148,62,.08); border-left:4px solid var(--brass-deep)' :
                     'background:rgba(47,93,80,.06); border-left:4px solid var(--forest)')}">
      <div class="flex items-baseline gap-2 flex-wrap mb-1">
        <span class="font-mono text-[10px] tracking-[0.16em] uppercase"
              th:style="${vc == 'RISK' ? 'color:var(--rust)' : (vc == 'NEEDS_ATTENTION' ? 'color:var(--brass-deep)' : 'color:var(--forest)')}"
              th:text="${vc == 'RISK' ? '[亟需调整]' : (vc == 'NEEDS_ATTENTION' ? '[需关注]' : '[稳健]')}">[稳健]</span>
        <span class="font-mono text-[10px] text-ink-subtle">总评</span>
      </div>
      <p class="text-sm text-ink leading-relaxed" th:text="${s.overallSummary()}">总评句</p>
    </div>

    <!-- 4 维度卡 -->
    <div class="space-y-2 mb-4">
      <div th:each="d : ${s.dimensions()}"
           th:with="dv=${d.verdict()}"
           class="paper-card px-3 py-2.5"
           th:style="${dv == 'RISK' ? 'border-left:3px solid var(--rust)' :
                       (dv == 'WARN' ? 'border-left:3px solid var(--brass-deep)' :
                       'border-left:3px solid var(--forest)')}">
        <div class="flex items-baseline justify-between gap-2 mb-1 flex-wrap">
          <div class="flex items-baseline gap-2">
            <span class="text-base" th:text="${d.icon()}">📊</span>
            <span class="font-display text-sm font-medium" th:text="${d.name()}">资产配置</span>
          </div>
          <span class="font-mono text-[10px] px-1.5 py-px border"
                th:style="${dv == 'RISK' ? 'color:var(--rust); border-color:var(--rust); background:rgba(159,74,58,.05)' :
                           (dv == 'WARN' ? 'color:var(--brass-deep); border-color:var(--brass-deep); background:rgba(196,148,62,.06)' :
                           'color:var(--forest); border-color:var(--forest); background:rgba(47,93,80,.05)')}"
                th:text="${dv}">OK</span>
        </div>
        <p class="text-xs text-ink leading-relaxed mb-1" th:text="${d.finding()}">诊断结论</p>
        <p class="text-[11px] text-ink-subtle font-mono leading-relaxed"
           th:if="${d.evidence() != null and !d.evidence().isBlank()}"
           th:text="'· ' + ${d.evidence()}">· 数据支撑</p>
      </div>
    </div>

    <!-- 优先行动 -->
    <div th:if="${s.actions() != null and !s.actions().isEmpty()}"
         class="paper-card px-3 py-2.5"
         style="background:rgba(122,90,57,.04); border-left:3px solid var(--brass-deep)">
      <div class="font-mono text-[10px] tracking-[0.16em] uppercase text-brass-deep mb-2">🎯 优 · 先 · 行 · 动</div>
      <ol class="space-y-1 text-xs text-ink list-decimal list-inside leading-relaxed">
        <li th:each="a : ${s.actions()}" th:text="${a}">行动</li>
      </ol>
    </div>
  </th:block>

  <!-- Fallback · 老路径(LLM 解析失败 / 旧 cache / unavailable):仍显示纯文本 -->
  <p th:if="${not result.available() or result.structured() == null}"
     class="text-sm text-ink leading-relaxed whitespace-pre-line"
     th:style="${result.available() ? '' : 'color:var(--ink-soft); font-style: italic;'}"
     th:text="${result.text()}">
    AI 综合诊断文案占位...
  </p>

  <div th:if="${result.available()}"
       class="mt-4 pt-3 border-t border-rule-soft flex items-baseline justify-between text-[10px] font-mono text-ink-subtle">
    <span>资 · 产 · 顾 · 问 · 综 · 合 · 视 · 角</span>
    <span>数字与判断仅供参考,不构成投资建议</span>
  </div>
</section>

<!-- placeholder · spinner · 由 family.html / account.html 通过 fragment 参数 aiDiagnoseUrl 传入 -->
<section th:fragment="placeholder(aiDiagnoseUrl)" id="ai-diagnose-panel"
         class="paper-card p-6 mb-8 ai-diagnose"
         th:attr="hx-get=${aiDiagnoseUrl}"
         hx-trigger="load"
         hx-swap="outerHTML">
  <div class="flex items-baseline justify-between mb-3">
    <span class="font-mono text-[10px] tracking-[0.18em] uppercase font-medium text-brass-deep">
      ✨  AI · 综合智能诊断
    </span>
    <span class="font-mono text-[9px] uppercase text-ink-subtle">分析中...</span>
  </div>
  <div class="flex items-center gap-3 text-sm text-ink-soft italic">
    <span class="inline-block w-3 h-3 border-2 border-brass-deep border-t-transparent rounded-full animate-spin"></span>
    <span>AI 正在阅读你家完整资产画像与本次命中的规则,综合判断中(约 3-5 秒)...</span>
  </div>
</section>
</body>
</html>
