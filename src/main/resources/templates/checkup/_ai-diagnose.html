<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<body>
<!--
  AI 综合智能诊断面板 fragment · v0.2 FR-40c · 决策 20
  由 AiDiagnoseController 渲染,前端通过 HTMX 异步加载替换 spinner placeholder
-->
<section th:fragment="panel" id="ai-diagnose-panel"
         class="paper-card p-6 mb-8 ai-diagnose"
         th:attr="data-vendor=${result.vendor()},data-cache=${result.fromCache()},data-available=${result.available()}">

  <div class="flex items-baseline justify-between mb-3">
    <div class="flex items-baseline gap-3">
      <span class="font-mono text-[10px] tracking-[0.18em] uppercase font-medium"
            th:style="${result.available() ? 'color:var(--brass-deep)' : 'color:var(--ink-soft)'}"
            th:text="${result.available() ? '✨  AI · 综合智能诊断' : 'ℹ️  AI · 暂不可用'}">
        ✨  AI · 综合智能诊断
      </span>
      <span th:if="${result.available()}" class="font-mono text-[9px] uppercase text-ink-subtle">
        <span th:text="${result.vendor()}">qwen</span>
        <span th:if="${result.fromCache()}" class="ml-1 px-1.5 py-px border border-rule-soft text-ink-subtle">cached</span>
      </span>
    </div>
    <button type="button"
            class="text-[10px] font-mono px-2 py-0.5 text-ink-subtle hover:text-brass-deep border border-rule-soft hover:border-brass-deep transition"
            th:hx-get="${scope == 'ACCOUNT' ? '/checkup/diagnose?account=' + accountId : '/checkup/diagnose'}"
            hx-target="#ai-diagnose-panel"
            hx-swap="outerHTML"
            title="重新生成 AI 诊断(忽略缓存)">↻ 刷新</button>
  </div>

  <p class="text-sm text-ink leading-relaxed whitespace-pre-line"
     th:style="${result.available() ? '' : 'color:var(--ink-soft); font-style: italic;'}"
     th:text="${result.text()}">
    AI 综合诊断文案占位...
  </p>

  <div th:if="${result.available()}"
       class="mt-4 pt-3 border-t border-rule-soft flex items-baseline justify-between text-[10px] font-mono text-ink-subtle">
    <span>资 · 产 · 顾 · 问 · 综 · 合 · 视 · 角</span>
    <span>数字与判断仅供参考,不构成投资建议</span>
  </div>
</section>

<!-- placeholder · spinner · 由 family.html / account.html 直接 inline 引用,无 backend -->
<section th:fragment="placeholder" id="ai-diagnose-panel"
         class="paper-card p-6 mb-8 ai-diagnose"
         th:hx-get="${aiDiagnoseUrl}"
         hx-trigger="load"
         hx-swap="outerHTML">
  <div class="flex items-baseline justify-between mb-3">
    <span class="font-mono text-[10px] tracking-[0.18em] uppercase font-medium text-brass-deep">
      ✨  AI · 综合智能诊断
    </span>
    <span class="font-mono text-[9px] uppercase text-ink-subtle">分析中...</span>
  </div>
  <div class="flex items-center gap-3 text-sm text-ink-soft italic">
    <span class="inline-block w-3 h-3 border-2 border-brass-deep border-t-transparent rounded-full animate-spin"></span>
    <span>AI 正在阅读你家完整资产画像与本次命中的规则,综合判断中(约 3-5 秒)...</span>
  </div>
</section>
</body>
</html>
