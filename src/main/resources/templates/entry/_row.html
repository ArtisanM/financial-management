<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<body>

<!-- controller 走 single fragment;each 走 row 直接调用 -->
<th:block th:fragment="single">
  <th:block th:each="row : ${rows}">
    <div th:replace="~{entry/_row :: row(${row}, null)}"></div>
  </th:block>
</th:block>

<!-- block fragment:wrapper 包含 row 自身 + 预渲染的 ledger HTML,作为 HTMX swap 的最小单位 -->
<div th:fragment="block(row, oob)" th:id="'entry-block-' + ${row.account.id}"
     th:attr="hx-swap-oob=${oob != null and oob == true ? 'outerHTML' : null}"
     th:hx-get="@{/entry/{id}/refresh(id=${row.account.id},period=${period.id})}"
     th:hx-trigger="|refresh-row-${row.account.id} from:body|"
     hx-swap="outerHTML">
  <div th:replace="~{entry/_row :: row(${row}, null)}"></div>
  <div th:utext="${ledgerHtmlByAccount != null ? ledgerHtmlByAccount.get(row.account.id + '') : ''}"></div>
</div>

<div th:fragment="row(row, oob)" th:id="'entry-row-' + ${row.account.id}"
     th:attr="hx-swap-oob=${oob != null and oob == true ? 'outerHTML' : null}, data-debug-ledger=${row.ledger == null ? 'NULL' : #lists.size(row.ledger)}"
     class="paper-card mb-3 px-6 py-4">
  <div class="flex items-center gap-4">
    <span th:class="${row.done ? 'tick-done' : 'tick-pending'}" th:text="${row.done ? '✓' : '·'}">✓</span>
    <div class="flex-1 min-w-0">
      <div class="flex items-baseline gap-3 flex-wrap">
        <span class="font-display text-base" th:text="${row.account.displayName}">招行储蓄卡-工资</span>
        <span class="pill" th:classappend="${row.account.type.name() == 'LOAN' ? ' pill-rust' : (row.account.type.name() == 'WEALTH' ? ' pill-forest' : (row.account.type.name() == 'STOCK' ? ' pill-brass' : ''))}"
              th:text="${row.account.type.label} + ' (' + ${row.account.type.name()} + ')'">现金 (CASH)</span>
        <span class="pill" th:if="${row.account.currency != 'CNY'}" th:text="${row.account.currency}">USD</span>
        <span class="font-mono text-[10px] text-ink-subtle" th:text="${row.ownerName}">张伟</span>
      </div>
      <div class="font-mono text-xs text-ink-subtle mt-1">
        <span th:text="'上期末 ' + ${row.previousBalanceLabel}">上期末 ¥45,000</span>
        <span class="mx-1">·</span>
        <span th:text="${row.done ? '已填' : '待填'}">已填</span>
      </div>
    </div>
    <div class="text-right min-w-[140px]">
      <div class="font-mono tnum text-lg" th:classappend="${row.account.type.name() == 'LOAN' ? ' num-neg' : ''}" th:text="${row.currentBalanceLabel}">¥73,200</div>
      <div class="font-mono text-[10px] text-ink-subtle tnum mt-0.5">
        上期末 <span th:text="${row.previousBalanceLabel}">¥45,000</span>
      </div>
      <div class="font-mono text-xs" th:classappend="${row.delta != null and row.delta.signum() > 0 ? ' num-pos' : (row.delta != null and row.delta.signum() < 0 ? ' num-neg' : ' text-ink-subtle')}"
           th:text="${row.deltaLabel}">+¥28,200</div>
    </div>
    <button type="button"
            th:hx-get="@{/entry/{id}/refresh(id=${row.account.id},period=${period.id})}"
            th:hx-target="'#entry-block-' + ${row.account.id}"
            hx-swap="outerHTML"
            title="重新加载本账户最新数据 + 流水"
            class="ml-2 w-7 h-7 flex items-center justify-center text-ink-subtle hover:text-brass-deep hover:bg-card-soft border border-rule font-mono text-xs"
            aria-label="刷新">⟳</button>
  </div>

  <div class="mt-4 border-t border-rule pt-4 grid grid-cols-1 xl:grid-cols-12 gap-4">
    <form class="xl:col-span-4 flex flex-wrap items-end gap-2"
          th:hx-post="@{/entry/{id}/balance(id=${row.account.id})}"
          th:hx-target="'#entry-block-' + ${row.account.id}"
          hx-swap="outerHTML"
          method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
      <input type="hidden" name="periodId" th:value="${period.id}">
      <label class="flex-1 min-w-[160px]">
        <span class="font-mono text-[10px] tracking-[0.16em] text-ink-subtle uppercase block">本期余额</span>
        <input name="newBalance" type="number" step="0.01" required
               th:with="curBal=${row.getCurrentSnapshot() != null ? row.getCurrentSnapshot().endBalance : null},prevBal=${row.getPreviousSnapshot() != null ? row.getPreviousSnapshot().endBalance : null},todoBal=${row.getTodo() != null ? row.getTodo().prefilledBalance : null}"
               th:value="${curBal != null ? curBal : (prevBal != null ? prevBal : (todoBal != null ? todoBal : ''))}"
               class="w-full border border-rule bg-card px-3 py-2 font-mono text-sm focus:outline-none focus:border-brass">
        <span class="block font-mono text-[10px] text-ink-subtle mt-1 tnum"
              th:if="${row.previousSnapshot != null}">
          参考 · 上期末 <b class="text-ink" th:text="${row.previousBalanceLabel}">¥45,000</b>
        </span>
      </label>
      <input name="note" class="flex-1 min-w-[140px] border border-rule bg-card px-3 py-2 text-sm" placeholder="备注">
      <button class="btn-ink text-[10px]">保存</button>
    </form>

    <div class="xl:col-span-4 text-xs font-mono text-ink-soft">
      <div class="grid grid-cols-2 gap-x-4 gap-y-1">
        <span>收入 <b class="tnum" th:text="${row.income}">0.00</b></span>
        <span>支出 <b class="tnum" th:text="${row.expense}">0.00</b></span>
        <span>转入 <b class="tnum" th:text="${row.transferIn}">0.00</b></span>
        <span>转出 <b class="tnum" th:text="${row.transferOut}">0.00</b></span>
      </div>
      <div class="mt-2">
        未解释
        <span class="tnum" th:classappend="${row.unexplained.signum() > 0 ? ' num-pos' : (row.unexplained.signum() < 0 ? ' num-neg' : ' text-ink-subtle')}"
              th:text="${row.unexplainedLabel}">—</span>
      </div>
      <div th:if="${row.warning != null}" class="mt-2 text-rust" th:text="${row.warning}">warning</div>
      <div th:if="${row.suggestTransfer}" class="mt-2 text-xs text-brass-deep italic">
        💡 看起来像账户间划转?未解释金额超过 ¥3,000,通常意味着资金在你的两个账户之间流动(而非外部收入/支出)。
      </div>
      <div th:if="${not #lists.isEmpty(row.incoming)}" class="mt-2 text-xs text-forest space-y-0.5">
        <div th:each="ref : ${row.incoming}">
          ↳ 已收到来自「<b th:text="${ref.counterpartyName}">招行</b>」的划转
          <span class="tnum num-pos" th:text="${ref.amountLabel}">¥200</span>
        </div>
      </div>
      <div th:if="${not #lists.isEmpty(row.outgoing)}" class="mt-2 text-xs text-rust space-y-0.5">
        <div th:each="ref : ${row.outgoing}">
          ↱ 已划出到「<b th:text="${ref.counterpartyName}">蚂蚁财富</b>」
          <span class="tnum num-neg" th:text="${ref.amountLabel}">¥200</span>
        </div>
      </div>
    </div>

    <div class="xl:col-span-4 flex flex-col gap-2">
      <div class="flex flex-wrap gap-2">
        <form th:hx-post="@{/entry/{id}/cash-flow(id=${row.account.id})}" th:hx-target="'#entry-block-' + ${row.account.id}" hx-swap="outerHTML" method="post" class="flex gap-1">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
          <input type="hidden" name="periodId" th:value="${period.id}">
          <input type="hidden" name="kind" value="INCOME">
          <input type="hidden" name="categoryCode" value="salary">
          <input name="amount" type="number" step="0.01" placeholder="+收入" class="w-24 border border-rule bg-card px-2 py-1 font-mono text-xs">
          <button class="btn-paper text-[10px]">+收入</button>
        </form>
        <form th:hx-post="@{/entry/{id}/cash-flow(id=${row.account.id})}" th:hx-target="'#entry-block-' + ${row.account.id}" hx-swap="outerHTML" method="post" class="flex gap-1">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
          <input type="hidden" name="periodId" th:value="${period.id}">
          <input type="hidden" name="kind" value="EXPENSE">
          <input type="hidden" name="categoryCode" value="consumption">
          <input name="amount" type="number" step="0.01" placeholder="-支出" class="w-24 border border-rule bg-card px-2 py-1 font-mono text-xs">
          <button class="btn-paper text-[10px]">-支出</button>
        </form>
      </div>
      <form th:hx-post="@{/entry/{id}/transfer(id=${row.account.id})}" th:hx-target="'#entry-block-' + ${row.account.id}" hx-swap="outerHTML" method="post" class="flex flex-wrap gap-1">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <input type="hidden" name="periodId" th:value="${period.id}">
        <select name="toAccountId" class="border border-rule bg-card px-2 py-1 text-xs">
          <option th:each="account : ${accounts}" th:if="${account.id != row.account.id}" th:value="${account.id}" th:text="${account.displayName}">目标账户</option>
        </select>
        <input name="amount" type="number" step="0.01" placeholder="划转金额" class="w-28 border border-rule bg-card px-2 py-1 font-mono text-xs">
        <button class="btn-paper text-[10px]" title="把本账户的钱划转到另一个账户(例:工资卡转去理财账户)">↔ 划转到</button>
      </form>
    </div>
  </div>

  <!-- 本期流水明细 · PRD FR-7/8/9 + §7.9 维护变更.
       NOTE: 真正的 details 列表渲染在 entry/index.html 的 each 内,fragment row 之外。
       这里只放一个占位 + summary 数,避免 Thymeleaf fragment 子元素 each + record accessor 的已知 bug. -->
  <div class="mt-4 pt-3 border-t border-rule font-mono text-[10px] tracking-[0.16em] uppercase text-ink-soft">
    本期流水 · <span th:text="${#lists.size(T(com.family.finance.service.EntryService).safeLedger(row))}">0</span> 笔
    <span class="text-ink-subtle ml-2 normal-case tracking-normal">详情见下方</span>
  </div>
</div>
</body>
</html>
