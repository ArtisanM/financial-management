<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('账户与模板 · 家庭账房')}"></head>
<body class="min-h-screen relative">

<div class="fixed top-0 left-0 right-0 h-1 bg-ink z-40"></div>
<header th:replace="~{fragments/nav :: nav('accounts', ${me}, ${nav})}"></header>

<main class="max-w-[1400px] mx-auto px-6 lg:px-10 py-10 relative z-10">
  <section class="mb-8 flex items-end justify-between flex-wrap gap-6">
    <div>
      <div class="eyebrow mb-2">账 · 户 · 全 · 览</div>
      <h1 class="font-display text-5xl font-medium tracking-tight">账户簿</h1>
      <p class="text-ink-soft text-sm mt-3 max-w-xl">
        一家共 <span th:text="${#lists.size(rows)}">11</span> 个账户。此处可增改归档、调整主理人与显示顺序;实际填报在
        <a th:href="@{/entry}" class="brass-link">填报页</a>。
      </p>
    </div>
    <a th:href="@{/accounts/new}" class="btn-ink no-underline">+ 添加账户(开向导)</a>
  </section>

  <section class="grid grid-cols-2 md:grid-cols-6 gap-px bg-rule mb-8">
    <div th:each="s : ${summary}" class="bg-card p-4">
      <div class="font-mono text-[10px] tracking-wider"
           th:classappend="${s.type.name() == 'LOAN' ? ' text-rust' : ' text-ink-subtle'}"
           th:text="${s.type}">CASH</div>
      <div class="font-display text-xl tnum mt-1" th:classappend="${s.type.name() == 'LOAN' ? ' text-rust' : ''}" th:text="${s.count}">4</div>
      <div class="font-mono text-xs text-ink-soft mt-1" th:text="${s.amountLabel}">¥304k</div>
    </div>
  </section>

  <section class="flex items-center gap-3 mb-6 flex-wrap">
    <span class="font-mono text-[10px] tracking-[0.16em] text-ink-soft uppercase">筛选 ·</span>
    <a th:href="@{/accounts(archived=${includeArchived})}"
       class="pill no-underline"
       th:classappend="${typeFilter == 'ALL' or typeFilter == null ? ' pill-ink' : ''}">全部</a>
    <a th:each="t : ${T(com.family.finance.domain.account.AccountType).values()}"
       th:href="@{/accounts(archived=${includeArchived},type=${t.name()})}"
       class="pill no-underline"
       th:classappend="${typeFilter == t.name() ? ' pill-ink' : ''}"
       th:text="${t.label} + ' (' + ${t.name()} + ')'">现金 (CASH)</a>
    <span class="ml-auto"></span>
    <a th:href="@{/accounts(archived=${!includeArchived},type=${typeFilter})}" class="btn-ghost no-underline"
       th:text="${includeArchived ? '隐藏已归档' : '显示已归档'}">显示已归档</a>
  </section>

  <section class="paper-card overflow-hidden mb-10 hidden md:block">
    <table class="ledger-table">
      <thead>
      <tr>
        <th>顺序</th>
        <th>名称</th>
        <th>类型</th>
        <th>币种</th>
        <th>主理人</th>
        <th>默认还款来源</th>
        <th class="num">本期末余额</th>
        <th class="num">操作</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="row : ${rows}" th:classappend="${row.archived ? ' opacity-50' : ''}">
        <td class="font-mono text-ink-subtle text-xs" th:text="${#numbers.formatInteger(row.account.displayOrder, 3)} + ' ·☰'">001 ·☰</td>
        <td>
          <a th:href="@{/accounts/{id}(id=${row.account.id})}"
             class="font-display hover:text-brass-deep no-underline"
             th:text="${row.account.displayName}">招行储蓄卡-工资</a>
          <!-- v0.2 类目 + 风险 pill (FR-37) · icon 用 inline SVG 不用 emoji -->
          <div class="flex items-center gap-1.5 mt-1 flex-wrap" th:if="${row.category != null}">
            <span class="pill text-[10px] inline-flex items-center gap-1" style="background:rgba(122,90,57,.10);border-color:var(--brass-deep);color:var(--brass-deep)">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/>
                <line x1="7" y1="7" x2="7.01" y2="7"/>
              </svg>
              <span th:text="${row.category.displayName}">货币基金</span>
            </span>
            <span class="pill text-[10px] inline-flex items-center gap-1" th:if="${row.effectiveRiskLevel() != null and row.effectiveRiskLevel() > 0}"
                  style="background:rgba(47,93,80,.08);border-color:var(--forest);color:var(--forest)">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
                <line x1="12" y1="9" x2="12" y2="13"/>
                <line x1="12" y1="17" x2="12.01" y2="17"/>
              </svg>
              <span th:text="${'风险 ' + row.riskStars()}">风险 ★</span>
              <svg th:if="${row.riskOverridden()}" width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" title="用户手工覆盖">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                <path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
              </svg>
            </span>
          </div>
        </td>
        <td>
          <span class="pill" th:classappend="${row.account.type.name() == 'LOAN' ? ' pill-rust' : (row.account.type.name() == 'WEALTH' ? ' pill-forest' : (row.account.type.name() == 'STOCK' ? ' pill-brass' : ''))}"
                th:text="${row.account.type.label} + ' (' + ${row.account.type.name()} + ')'">现金 (CASH)</span>
        </td>
        <td class="font-mono text-xs" th:text="${row.account.currency}">CNY</td>
        <td class="text-ink-soft" th:text="${row.ownerName}">张伟</td>
        <td class="text-ink-subtle" th:text="${row.paymentSourceName}">—</td>
        <td class="num" th:classappend="${row.account.type.name() == 'LOAN' ? ' num-neg' : ''}" th:text="${row.balanceLabel}">¥73,200</td>
        <td class="text-right whitespace-nowrap">
          <!-- v0.2 操作 icon · Lucide 风格 inline SVG · stroke=currentColor 跟随 .btn-ghost 文字色 -->
          <button class="btn-ghost inline-flex items-center gap-1" title="账户间划转" type="button">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M7 16V4M3 8l4-4 4 4M17 8v12m4-4l-4 4-4-4"/>
            </svg>
            <span>划转</span>
          </button>
          <a th:href="@{/accounts/{id}(id=${row.account.id})}" class="btn-ghost no-underline inline-flex items-center gap-1" title="跨期流水档案 · 月分组时间线">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/>
            </svg>
            <span>流水档案</span>
          </a>
          <a th:href="@{/checkup(account=${row.account.id})}" class="btn-ghost no-underline inline-flex items-center gap-1" title="进入资产体检">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
            </svg>
            <span>体检</span>
          </a>
          <a th:href="@{/accounts/{id}/ledger.csv(id=${row.account.id})}" class="btn-ghost no-underline inline-flex items-center gap-1" title="导出账本 CSV">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/>
            </svg>
            <span>账本</span>
          </a>
          <a th:href="@{/accounts/{id}/edit(id=${row.account.id})}" class="btn-ghost no-underline inline-flex items-center gap-1" title="编辑账户">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
              <path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
            </svg>
            <span>编辑</span>
          </a>
          <form th:if="${!row.archived}" th:action="@{/accounts/{id}/archive(id=${row.account.id})}" method="post" class="inline">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button class="btn-ghost inline-flex items-center gap-1" title="归档此账户">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <rect x="2" y="3" width="20" height="5" rx="1"/>
                <path d="M4 8v11a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8M10 12h4"/>
              </svg>
              <span>归档</span>
            </button>
          </form>
          <form th:if="${row.archived}" th:action="@{/accounts/{id}/restore(id=${row.account.id})}" method="post" class="inline">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button class="btn-ghost inline-flex items-center gap-1" title="恢复此账户">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M3 12a9 9 0 1 0 3-6.7L3 8M3 3v5h5"/>
              </svg>
              <span>恢复</span>
            </button>
          </form>
        </td>
      </tr>
      </tbody>
    </table>
  </section>

  <section class="md:hidden space-y-3 mb-10">
    <div class="text-xs text-ink-subtle font-mono tracking-wider uppercase mb-3 flex items-center justify-between">
      <span th:text="${#lists.size(rows)} + ' 个账户 · 卡片视图'">11 个账户 · 卡片视图</span>
      <span>↑↓ 拖动调序</span>
    </div>
    <div th:each="row : ${rows}" class="paper-card p-4" th:style="${row.account.type.name() == 'LOAN' ? 'border-color: var(--rust-soft);' : ''}">
      <div class="flex items-baseline justify-between gap-2 mb-2">
        <div class="flex-1 min-w-0">
          <a th:href="@{/accounts/{id}(id=${row.account.id})}"
             class="font-display text-base hover:text-brass-deep no-underline block"
             th:text="${row.account.displayName}">招行储蓄卡-工资</a>
          <div class="font-mono text-[10px] text-ink-subtle mt-0.5 tracking-wider" th:text="${#numbers.formatInteger(row.account.displayOrder, 3)} + ' · ' + ${row.ownerName}">001 · 张伟</div>
          <!-- v0.2 类目 + 风险 pill (FR-37) · icon SVG 化 -->
          <div class="flex items-center gap-1.5 mt-2 flex-wrap" th:if="${row.category != null}">
            <span class="pill text-[10px] inline-flex items-center gap-1" style="background:rgba(122,90,57,.10);border-color:var(--brass-deep);color:var(--brass-deep)">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/>
              </svg>
              <span th:text="${row.category.displayName}">货币基金</span>
            </span>
            <span class="pill text-[10px] inline-flex items-center gap-1" th:if="${row.effectiveRiskLevel() != null and row.effectiveRiskLevel() > 0}"
                  style="background:rgba(47,93,80,.08);border-color:var(--forest);color:var(--forest)">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
              </svg>
              <span th:text="${'风险 ' + row.riskStars()}">风险 ★</span>
            </span>
          </div>
        </div>
        <span class="pill" th:classappend="${row.account.type.name() == 'LOAN' ? ' pill-rust' : (row.account.type.name() == 'WEALTH' ? ' pill-forest' : (row.account.type.name() == 'STOCK' ? ' pill-brass' : ''))}"
              th:text="${row.account.type.label} + ' (' + ${row.account.type.name()} + ')'">现金 (CASH)</span>
      </div>
      <div class="flex items-baseline justify-between mt-3 pt-3 border-t border-rule-soft">
        <span class="text-xs text-ink-soft" th:text="${row.account.type.name() == 'LOAN' ? '本期欠款' : '本期末'}">本期末</span>
        <span class="font-mono text-base tnum" th:classappend="${row.account.type.name() == 'LOAN' ? ' num-neg' : ''}" th:text="${row.balanceLabel}">¥73,200</span>
      </div>
      <div class="flex gap-2 mt-3 flex-wrap">
        <a th:href="@{/accounts/{id}(id=${row.account.id})}" class="btn-paper text-[10px] no-underline inline-flex items-center gap-1" title="跨期流水档案">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/>
          </svg>
          <span>流水档案</span>
        </a>
        <a th:href="@{/checkup(account=${row.account.id})}" class="btn-paper text-[10px] no-underline inline-flex items-center gap-1" title="资产体检">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
          </svg>
          <span>体检</span>
        </a>
        <a th:href="@{/accounts/{id}/edit(id=${row.account.id})}" class="btn-paper text-[10px] no-underline inline-flex items-center gap-1" title="编辑">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
          <span>编辑</span>
        </a>
        <button class="btn-ghost text-[10px] inline-flex items-center gap-1" title="划转" type="button">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M7 16V4M3 8l4-4 4 4M17 8v12m4-4l-4 4-4-4"/>
          </svg>
          <span>划转</span>
        </button>
        <form th:if="${!row.archived}" th:action="@{/accounts/{id}/archive(id=${row.account.id})}" method="post">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
          <button class="btn-ghost text-[10px] inline-flex items-center gap-1" title="归档">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="2" y="3" width="20" height="5" rx="1"/>
              <path d="M4 8v11a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8M10 12h4"/>
            </svg>
            <span>归档</span>
          </button>
        </form>
        <form th:if="${row.archived}" th:action="@{/accounts/{id}/restore(id=${row.account.id})}" method="post">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
          <button class="btn-ghost text-[10px] inline-flex items-center gap-1" title="恢复">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M3 12a9 9 0 1 0 3-6.7L3 8M3 3v5h5"/>
            </svg>
            <span>恢复</span>
          </button>
        </form>
      </div>
    </div>
  </section>

  <th:block th:if="${showWizard}" th:replace="~{accounts/_template-wizard :: wizard}"></th:block>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
