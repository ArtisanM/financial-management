<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="region" id="dashboard-region">
  <section class="mb-10 fade-in">
    <div class="flex items-end justify-between flex-wrap gap-6 mb-6">
      <div>
        <div class="eyebrow mb-2" th:text="${#temporals.format(anchorPeriod.periodStart, 'yyyy · MM')} + ' · 月度账册'">2026 · 04 · 月度账册</div>
        <h1 class="font-display text-5xl font-medium tracking-tight">
          家庭仪表盘,<span class="italic font-light text-brass-deep">实时汇总。</span>
        </h1>
        <p class="text-ink-soft mt-3 max-w-xl text-sm">
          较上期净资产变化 <span class="font-mono text-forest" th:text="${kpiDelta}">+¥48,200</span>,
          储蓄率 <span class="font-mono" th:text="${savingsRate}">—</span>。
        </p>
      </div>
      <div class="flex border border-rule">
        <a th:each="r : ${ranges}"
           th:href="@{/dashboard(range=${r},currency=${currency},accounts=${accountsCsv})}"
           hx-target="#dashboard-region" hx-swap="outerHTML"
           class="font-mono text-[11px] tracking-[0.12em] px-4 py-2 no-underline border-l border-rule first:border-l-0"
           th:classappend="${range == r ? ' bg-ink text-paper' : ' text-ink-soft hover:bg-card-soft'}"
           th:text="${r}">1Y</a>
      </div>
    </div>

    <div th:if="${!#lists.isEmpty(pendingRows)}" class="border border-rust bg-rust/[0.04] px-5 py-3 flex items-center justify-between gap-4 flex-wrap">
      <div class="flex items-center gap-4">
        <span class="pill pill-rust">未结账</span>
        <p class="text-sm">本期还有 <span class="font-mono text-rust" th:text="${#lists.size(pendingRows)} + ' 个账户'">2 个账户</span>未填。</p>
      </div>
      <a th:href="@{/entry}" class="btn-paper text-[10px] no-underline">前往填报 →</a>
    </div>
  </section>

  <section class="mb-8">
    <div class="paper-card px-5 py-3 flex items-center justify-between flex-wrap gap-4">
      <div class="flex items-center gap-3 flex-wrap">
        <span class="font-mono text-[10px] tracking-[0.18em] uppercase text-ink-soft">账户范围</span>
        <span class="flex items-center gap-2 font-mono text-[12px]">
          <span class="w-2 h-2 rounded-full bg-forest"></span>
          <span class="font-display text-base" th:text="${selectedAccountCount} + ' 个已选'">全部 11 个</span>
        </span>
        <a th:href="@{/dashboard(range=${range},currency=${currency})}" hx-target="#dashboard-region" hx-swap="outerHTML"
           class="font-mono text-[10px] tracking-wider text-ink-soft hover:text-brass-deep no-underline">↺ 重置</a>
      </div>
      <div class="flex items-center gap-2">
        <span class="font-mono text-[10px] tracking-[0.18em] uppercase text-ink-soft">显示</span>
        <div class="flex border border-rule">
          <a th:each="c : ${currencies}"
             th:href="@{/dashboard(range=${range},currency=${c},accounts=${accountsCsv})}"
             hx-target="#dashboard-region" hx-swap="outerHTML"
             class="font-mono text-[11px] px-3 py-1.5 tracking-wider no-underline border-l border-rule first:border-l-0"
             th:classappend="${currency == c ? ' bg-ink text-paper' : ' text-ink-soft hover:bg-card-soft'}"
             th:text="${c == 'CNY' ? '¥ CNY' : (c == 'USD' ? '$ USD' : 'HK$ HKD')}">¥ CNY</a>
        </div>
      </div>
    </div>
    <details class="paper-card border-t-0 px-5 py-4 bg-card-soft">
      <summary class="font-mono text-[10px] tracking-[0.18em] uppercase cursor-pointer">展开账户筛选</summary>
      <div class="mt-4 grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-1">
        <a th:each="account : ${allAccounts}"
           th:href="@{/dashboard(range=${range},currency=${currency},accounts=${account.id})}"
           hx-target="#dashboard-region" hx-swap="outerHTML"
           class="flex items-center justify-between gap-3 py-1.5 hover:bg-paper px-2 -mx-2 no-underline">
          <span>
            <span class="font-display text-sm" th:text="${account.displayName}">账户</span>
            <span class="ml-2 font-mono text-[10px] text-ink-subtle" th:text="${account.type}">CASH</span>
          </span>
          <span class="font-mono text-[10px] text-ink-subtle">只看</span>
        </a>
      </div>
    </details>
  </section>

  <section class="grid grid-cols-2 lg:grid-cols-5 gap-px bg-rule mb-10">
    <div class="kpi-card"><span class="kpi-eyebrow">净资产</span><div class="kpi-value tnum" th:text="${kpiNetWorth}">¥0</div><div class="kpi-delta" th:text="${kpiDelta}">—</div></div>
    <div class="kpi-card"><span class="kpi-eyebrow">总资产</span><div class="kpi-value tnum" th:text="${kpiAssets}">¥0</div><div class="kpi-delta">不含 LOAN</div></div>
    <div class="kpi-card"><span class="kpi-eyebrow">总负债</span><div class="kpi-value tnum num-neg" th:text="${kpiLiabilities}">¥0</div><div class="kpi-delta">仅 LOAN</div></div>
    <div class="kpi-card"><span class="kpi-eyebrow">紧急储备</span><div class="kpi-value tnum" th:text="${kpiEmergency}">—</div><div class="kpi-delta">流动资产 / 月均支出</div></div>
    <div class="kpi-card"><span class="kpi-eyebrow">负债率</span><div class="kpi-value tnum" th:text="${kpiDebtRatio}">—</div><div class="kpi-delta">负债 / 资产</div></div>
  </section>

  <section class="grid grid-cols-1 lg:grid-cols-12 gap-6 mb-10">
    <div class="paper-card p-6 lg:col-span-8">
      <div class="eyebrow mb-1">净资产趋势</div>
      <div style="height:360px"><canvas id="netWorthChart"></canvas></div>
    </div>
    <div class="paper-card p-6 lg:col-span-4">
      <div class="eyebrow mb-1">资产配置</div>
      <div style="height:360px"><canvas id="allocationChart"></canvas></div>
    </div>
  </section>

  <section class="paper-card p-6 mb-10">
    <div class="eyebrow mb-1">收入 / 支出 / 储蓄率</div>
    <div style="height:320px"><canvas id="incomeExpenseChart"></canvas></div>
  </section>

  <section class="mb-10">
    <div class="flex items-baseline justify-between mb-3">
      <h2 class="font-display text-2xl font-medium">账户列表</h2>
      <span class="font-mono text-[10px] text-ink-subtle" th:text="${#lists.size(accountRows)} + ' 个账户'">11 个账户</span>
    </div>
    <div class="paper-card overflow-hidden">
      <table class="ledger-table">
        <thead><tr><th>账户</th><th>类型</th><th class="num">当前价值</th><th class="num">收益率</th><th>近况</th></tr></thead>
        <tbody>
        <tr th:each="account : ${accountRows}">
          <td><span class="font-display" th:text="${account.accountName}">账户</span></td>
          <td><span class="pill" th:text="${account.accountType}">CASH</span></td>
          <td class="num" th:text="${account.currentValue == null ? '—' : account.currentValue}">0</td>
          <td class="num" th:text="${account.xirr == null ? '—' : (#numbers.formatDecimal(account.xirr * 100, 1, 2) + '%')}">—</td>
          <td><svg class="sparkline-pos" width="80" height="22" viewBox="0 0 80 22"><polyline fill="none" stroke="currentColor" stroke-width="1.5" points="0,18 10,15 20,16 30,11 40,13 50,8 60,10 70,6 80,4"/></svg></td>
        </tr>
        </tbody>
      </table>
    </div>
  </section>

  <script th:inline="javascript">
    (() => {
      const data = {
        labels: [[${trendLabels}]],
        netWorth: [[${trendValues}]],
        income: [[${incomeValues}]],
        expense: [[${expenseValues}]],
        savings: [[${savingsValues}]],
        allocationLabels: [[${allocationLabels}]],
        allocationValues: [[${allocationValues}]]
      };
      window.financeCharts = window.financeCharts || {};
      Object.values(window.financeCharts).forEach(chart => chart && chart.destroy && chart.destroy());
      const line = document.getElementById('netWorthChart');
      if (line) window.financeCharts.netWorth = new Chart(line, {type:'line',data:{labels:data.labels,datasets:[{label:'净资产',data:data.netWorth,borderColor:'#2f5d50',backgroundColor:'rgba(47,93,80,.08)',tension:.35,fill:true}]},options:{maintainAspectRatio:false}});
      const mixed = document.getElementById('incomeExpenseChart');
      if (mixed) window.financeCharts.incomeExpense = new Chart(mixed, {data:{labels:data.labels,datasets:[{type:'bar',label:'收入',data:data.income,backgroundColor:'#2f5d50'},{type:'bar',label:'支出',data:data.expense,backgroundColor:'#9f4a3a'},{type:'line',label:'储蓄率 %',data:data.savings,borderColor:'#a77b35',yAxisID:'y1'}]},options:{maintainAspectRatio:false,scales:{y:{beginAtZero:true},y1:{position:'right'}}}});
      const donut = document.getElementById('allocationChart');
      if (donut) window.financeCharts.allocation = new Chart(donut, {type:'doughnut',data:{labels:data.allocationLabels,datasets:[{data:data.allocationValues,backgroundColor:['#a77b35','#2f5d50','#6f7f98','#8f6048','#333333']}]},options:{maintainAspectRatio:false}});
    })();
  </script>
</div>
</body>
</html>
