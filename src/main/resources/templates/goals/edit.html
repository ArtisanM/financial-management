<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('编辑目标 · ' + ${goal.name})}"></head>
<body class="min-h-screen relative">
<div class="fixed top-0 left-0 right-0 h-1 bg-ink z-40"></div>
<header th:replace="~{fragments/nav :: nav('goals', ${me}, ${nav})}"></header>

<main class="max-w-[900px] mx-auto px-6 py-10 relative z-10">
  <div class="font-mono text-[10px] tracking-[0.18em] uppercase text-ink-subtle mb-4">
    <a th:href="@{/goals}" class="hover:text-ink no-underline">目标</a>
    <span class="mx-2 text-rule">/</span>
    <a th:href="@{|/goals/${goal.id}|}" class="hover:text-ink no-underline" th:text="${goal.name}">目标</a>
    <span class="mx-2 text-rule">/</span><span class="text-ink">编辑</span>
  </div>

  <div class="mb-8">
    <div class="eyebrow mb-2" th:text="${goal.goalType}">RETIREMENT</div>
    <h1 class="font-display text-4xl md:text-5xl font-medium tracking-tight">编辑参数</h1>
  </div>

  <form th:action="@{|/goals/${goal.id}/edit|}" method="post" class="paper-card p-8 space-y-6">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

    <div>
      <label class="font-mono text-[10px] uppercase text-ink-subtle mb-1 block">目标名称</label>
      <input type="text" name="name" th:value="${goal.name}"
             class="w-full font-display text-xl bg-paper-soft border border-rule px-4 py-3">
    </div>

    <!-- RETIREMENT 字段 -->
    <div th:if="${goalType.name() == 'RETIREMENT'}" class="grid grid-cols-2 gap-4">
      <div>
        <label class="font-mono text-[10px] uppercase text-ink-subtle mb-1 block">当前年龄</label>
        <input type="number" name="currentAge" required min="18" max="80" th:value="${params.currentAge}"
               class="w-full font-mono text-base bg-paper-soft border border-rule px-3 py-2 tnum">
      </div>
      <div>
        <label class="font-mono text-[10px] uppercase text-ink-subtle mb-1 block">目标退休年龄</label>
        <input type="number" name="retireAge" required min="18" max="90" th:value="${params.retireAge}"
               class="w-full font-mono text-base bg-paper-soft border border-rule px-3 py-2 tnum">
      </div>
      <div class="col-span-2">
        <label class="font-mono text-[10px] uppercase text-ink-subtle mb-1 block">期望月支出(今天购买力)¥</label>
        <input type="number" name="monthlyExpense" required step="100" min="1000" max="1000000" th:value="${params.monthlyExpense}"
               class="w-full font-mono text-base bg-paper-soft border border-rule px-3 py-2 tnum text-right">
        <p class="font-mono text-[10px] text-ink-subtle mt-1">↳ 系统会按通胀率自动调整到退休时购买力</p>
        <!-- v0.5 FR-81 · 月支出口径 · 编辑时回显已保存选项 -->
        <div class="mt-3 paper-card p-3" style="background:rgba(122,90,57,.06);border-left:4px solid var(--brass-deep)">
          <label class="flex items-center gap-2 mb-2">
            <input type="radio" name="expenseMode" value="FIXED"
                   th:checked="${params.expenseMode == null or params.expenseMode == 'FIXED'}"
                   style="accent-color:var(--brass-deep)">
            <span class="text-sm">固定值(用上面填的数)</span>
          </label>
          <label class="flex items-center gap-2">
            <input type="radio" name="expenseMode" value="AUTO_MONTHLY"
                   th:checked="${params.expenseMode == 'AUTO_MONTHLY'}"
                   style="accent-color:var(--brass-deep)">
            <span class="text-sm">自动适配月结支出 <span class="font-mono text-[9px] uppercase" style="background:var(--brass-deep);color:var(--paper);padding:1px 5px;border-radius:2px">新</span></span>
          </label>
          <div class="grid grid-cols-2 gap-2 mt-2">
            <select name="expenseSmoothing" class="font-mono text-[11px] border border-rule bg-paper px-2 py-1">
              <option value="TRIMMED" th:selected="${params.expenseSmoothing == null or params.expenseSmoothing == 'TRIMMED'}">剔极端值(推荐)</option>
              <option value="MEDIAN" th:selected="${params.expenseSmoothing == 'MEDIAN'}">中位数</option>
              <option value="MEAN" th:selected="${params.expenseSmoothing == 'MEAN'}">均值</option>
            </select>
            <select name="expenseWindowMonths" class="font-mono text-[11px] border border-rule bg-paper px-2 py-1">
              <option value="12" th:selected="${params.expenseWindowMonths == null or params.expenseWindowMonths == 12}">近 12 月</option>
              <option value="6" th:selected="${params.expenseWindowMonths == 6}">近 6 月</option>
              <option value="24" th:selected="${params.expenseWindowMonths == 24}">近 24 月</option>
            </select>
          </div>
          <p class="font-mono text-[10px] text-ink-subtle mt-1">↳ 自动模式:周期关闭按真实月结支出滚动重算 · 目标随实际支出动态调整</p>
        </div>
      </div>
      <div>
        <label class="font-mono text-[10px] uppercase text-ink-subtle mb-1 block">通胀率</label>
        <input type="number" name="inflationRate" step="0.001" min="0" max="0.10" th:value="${params.inflationRate}"
               class="w-full font-mono text-base bg-paper-soft border border-rule px-3 py-2 tnum">
      </div>
      <div>
        <label class="font-mono text-[10px] uppercase text-ink-subtle mb-1 block">取用率</label>
        <input type="number" name="withdrawalRate" step="0.001" min="0.02" max="0.06" th:value="${params.withdrawalRate}"
               class="w-full font-mono text-base bg-paper-soft border border-rule px-3 py-2 tnum">
      </div>
    </div>

    <!-- EDUCATION 字段 -->
    <div th:if="${goalType.name() == 'EDUCATION'}" class="space-y-4">
      <div>
        <label class="font-mono text-[10px] uppercase text-ink-subtle mb-1 block">孩子</label>
        <select name="childMemberId" required data-searchable
                class="w-full font-base bg-paper-soft border border-rule px-3 py-3">
          <option th:each="m : ${childCandidates}"
                  th:value="${m.id}"
                  th:text="${m.displayName}"
                  th:selected="${m.id == params.childMemberId}">成员C</option>
        </select>
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="font-mono text-[10px] uppercase text-ink-subtle mb-1 block">出生年份</label>
          <input type="number" name="childBirthYear" required min="1980" th:max="${currentYear}" th:value="${params.childBirthYear}"
                 class="w-full font-mono text-base bg-paper-soft border border-rule px-3 py-2 tnum">
        </div>
        <div>
          <label class="font-mono text-[10px] uppercase text-ink-subtle mb-1 block">目标使用年龄</label>
          <input type="number" name="targetYearOffset" min="16" max="30" th:value="${params.targetYearOffset}"
                 class="w-full font-mono text-base bg-paper-soft border border-rule px-3 py-2 tnum">
        </div>
        <div>
          <label class="font-mono text-[10px] uppercase text-ink-subtle mb-1 block">目标金额 ¥</label>
          <input type="number" name="targetAmount" required step="10000" min="10000" max="10000000" th:value="${params.targetAmount}"
                 class="w-full font-mono text-base bg-paper-soft border border-rule px-3 py-2 tnum text-right">
        </div>
        <div>
          <label class="font-mono text-[10px] uppercase text-ink-subtle mb-1 block">通胀率</label>
          <input type="number" name="inflationRate" step="0.001" min="0" max="0.10" th:value="${params.inflationRate}"
                 class="w-full font-mono text-base bg-paper-soft border border-rule px-3 py-2 tnum">
        </div>
      </div>
    </div>

    <!-- EMERGENCY 字段 -->
    <div th:if="${goalType.name() == 'EMERGENCY'}" class="space-y-4">
      <div>
        <label class="font-mono text-[10px] uppercase text-ink-subtle mb-1 block">储备月数</label>
        <input type="number" name="monthsTarget" required min="1" max="24" th:value="${params.monthsTarget}"
               class="w-full font-mono text-base bg-paper-soft border border-rule px-3 py-2 tnum">
      </div>
      <div>
        <label class="font-mono text-[10px] uppercase text-ink-subtle mb-2 block">基线模式</label>
        <label class="block border border-rule-soft p-3 mb-2 cursor-pointer">
          <input type="radio" name="autoBaseline" value="true" th:checked="${params.autoBaseline == null or params.autoBaseline}" class="mr-2">
          自动基线
        </label>
        <label class="block border border-rule-soft p-3 cursor-pointer">
          <input type="radio" name="autoBaseline" value="false" th:checked="${params.autoBaseline != null and !params.autoBaseline}" class="mr-2">
          手填基线 ¥ <input type="number" name="fixedBaseline" step="100" min="100" max="1000000"
                          th:value="${params.fixedBaseline}" data-require-when="autoBaseline=false"
                          class="font-mono bg-paper border border-rule px-2 py-1 w-32 tnum"> /月
        </label>
      </div>
    </div>

    <div class="flex items-center justify-between pt-6 border-t border-rule-soft">
      <a th:href="@{|/goals/${goal.id}|}" class="btn-paper no-underline">← 取消</a>
      <button type="submit" class="btn-ink">✓ 保存</button>
    </div>
  </form>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
