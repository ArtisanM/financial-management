<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('新建教育金目标')}"></head>
<body class="min-h-screen relative">
<div class="fixed top-0 left-0 right-0 h-1 bg-ink z-40"></div>
<header th:replace="~{fragments/nav :: nav('goals', ${me}, ${nav})}"></header>

<main class="max-w-[900px] mx-auto px-6 py-10 relative z-10">
  <div class="font-mono text-[10px] tracking-[0.18em] uppercase text-ink-subtle mb-4">
    <a th:href="@{/goals}" class="hover:text-ink no-underline">目标</a>
    <span class="mx-2 text-rule">/</span>
    <a th:href="@{/goals/new}" class="hover:text-ink no-underline">新建</a>
    <span class="mx-2 text-rule">/</span><span class="text-ink">教育金</span>
  </div>

  <div class="mb-8">
    <div class="eyebrow mb-2" style="color:var(--brass-deep)">EDUCATION · 教 · 育 · 金</div>
    <h1 class="font-display text-4xl md:text-5xl font-medium tracking-tight">为孩子准备大学基金</h1>
    <p class="font-serif text-sm text-ink-soft mt-3">孩子 + 出生年 → 目标年份 = 18 岁那年 · 反推月供。</p>
  </div>

  <!-- v0.3 FR-53a · AI 推荐默认值 -->
  <div class="paper-card p-4 mb-4 bg-card-soft flex items-center justify-between" style="border-left:4px solid var(--brass-deep)">
    <div>
      <div class="font-mono text-[10px] tracking-[0.18em] uppercase text-brass-deep">🤖 AI · 推 · 荐</div>
      <p class="text-xs text-ink-soft mt-1">让 AI 推荐合理目标金额(国内本科 / 中外合办 / 海外)。</p>
    </div>
    <button type="button" onclick="adviseAi('education', 'goal-form', this)"
            class="btn-paper text-sm" style="border-color:var(--brass-deep);color:var(--brass-deep)">🤖 AI 推荐</button>
  </div>
  <div id="ai-rationale" class="hidden paper-card p-3 mb-4 bg-card-soft text-sm font-serif text-ink-soft"></div>

  <form id="goal-form" th:action="@{/goals/new/education}" method="post" class="paper-card p-8 space-y-6">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

    <div>
      <label class="font-mono text-[10px] uppercase text-ink-subtle mb-1 block">目标名称</label>
      <input type="text" name="name" class="w-full font-display text-xl bg-paper-soft border border-rule px-4 py-3"
             placeholder="留空用默认名 · 子女教育金">
    </div>

    <div>
      <label class="font-mono text-[10px] uppercase text-ink-subtle mb-1 block">孩子</label>
      <select name="childMemberId" required data-searchable
              class="w-full font-base bg-paper-soft border border-rule px-3 py-3">
        <option value="">— 选择 —</option>
        <option th:each="m : ${childCandidates}" th:value="${m.id}" th:text="${m.displayName}">成员C</option>
      </select>
      <p class="font-mono text-[10px] text-ink-subtle mt-1">↳ 数据库存 child_member_id · prompt 走代号 · UI 走 displayName</p>
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="font-mono text-[10px] uppercase text-ink-subtle mb-1 block">孩子出生年份</label>
        <input type="number" name="childBirthYear" required min="1980" th:max="${currentYear}" value="2020"
               class="w-full font-mono text-base bg-paper-soft border border-rule px-3 py-2 tnum">
      </div>
      <div>
        <label class="font-mono text-[10px] uppercase text-ink-subtle mb-1 block">目标使用年龄</label>
        <input type="number" name="targetYearOffset" min="16" max="30" value="18"
               class="w-full font-mono text-base bg-paper-soft border border-rule px-3 py-2 tnum">
        <p class="font-mono text-[10px] text-ink-subtle mt-1">↳ 18 = 高考那年 · 24 = 研究生</p>
      </div>
      <div>
        <label class="font-mono text-[10px] uppercase text-ink-subtle mb-1 block">目标金额(今天购买力)¥</label>
        <input type="number" name="targetAmount" required step="10000" min="10000" max="10000000" value="800000"
               class="w-full font-mono text-base bg-paper-soft border border-rule px-3 py-2 tnum text-right">
        <p class="font-mono text-[10px] text-ink-subtle mt-1">↳ 国内本科 20w · 中外合办 80w · 海外 150w+</p>
      </div>
      <div>
        <label class="font-mono text-[10px] uppercase text-ink-subtle mb-1 block">通胀率假设</label>
        <input type="number" name="inflationRate" step="0.001" min="0" max="0.10" value="0.03"
               class="w-full font-mono text-base bg-paper-soft border border-rule px-3 py-2 tnum">
        <p class="font-mono text-[10px] text-ink-subtle mt-1">↳ 教育通胀比 CPI 高 · 默认 0.03</p>
      </div>
    </div>

    <div class="flex items-center justify-between pt-6 border-t border-rule-soft">
      <a th:href="@{/goals/new}" class="btn-paper no-underline">← 返回</a>
      <button type="submit" class="btn-ink">✓ 保存并查看三情景</button>
    </div>
  </form>

  <script th:src="@{/js/goal-advise.js(v=${buildVersion})}" defer></script>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
