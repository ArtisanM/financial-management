<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="家庭账房 logo">
  <title>家庭账房 — 屋顶下的硬币</title>
  <!-- 印章外框 -->
  <rect x="2" y="2" width="60" height="60" rx="4" fill="#f6f1ea" stroke="#1a1714" stroke-width="1.6"/>
  <rect x="5.5" y="5.5" width="53" height="53" rx="2" fill="none" stroke="#1a1714" stroke-width="0.5" stroke-dasharray="2 2" opacity=".5"/>
  <!-- 屋顶(双坡) -->
  <path d="M 12 30 L 32 13 L 52 30" fill="none" stroke="#1a1714" stroke-width="2.6" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- 屋脊小烟囱 -->
  <path d="M 41 19 L 41 14 L 45 14 L 45 23" fill="none" stroke="#1a1714" stroke-width="1.4" stroke-linejoin="round"/>
  <!-- 屋顶下两条墙脚短线(界定家的轮廓) -->
  <line x1="14" y1="30" x2="14" y2="33" stroke="#1a1714" stroke-width="2.6" stroke-linecap="round"/>
  <line x1="50" y1="30" x2="50" y2="33" stroke="#1a1714" stroke-width="2.6" stroke-linecap="round"/>
  <!-- 硬币(黄铜色填充) -->
  <circle cx="32" cy="42" r="13" fill="#c4943e" stroke="#1a1714" stroke-width="1.8"/>
  <!-- 硬币内圈装饰 -->
  <circle cx="32" cy="42" r="9.5" fill="none" stroke="#1a1714" stroke-width="0.6"/>
  <!-- ¥ 符号(用 path 模拟,粗墨色) -->
  <g stroke="#1a1714" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M 27 37 L 32 43 L 37 37"/>
    <line x1="32" y1="43" x2="32" y2="49"/>
    <line x1="27.5" y1="43.5" x2="36.5" y2="43.5"/>
    <line x1="27.5" y1="46" x2="36.5" y2="46"/>
  </g>
  <!-- 右上角朱红印泥点 -->
  <circle cx="55.5" cy="9" r="2.6" fill="#9f4a3a"/>
</svg>
